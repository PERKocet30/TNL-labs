<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TNL LABS 🧪 — Cultivators</title>
<!-- The link itself is the pitch. This gets pasted into DMs with 756 people
     in them; a bare blue link there is a wasted shot. Static, because a
     crawler doesn't run JavaScript — whatever the app renders later, THIS
     is what Meta reads. -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="TNL LABS">
<meta property="og:url" content="https://labs.tnllabs.com/">
<meta property="og:title" content="TNL LABS — Cultivators">
<meta property="og:description" content="Artists, designers, musicians, entrepreneurs. Creatives don't just meet here — they multiply.">
<meta property="og:image" content="https://labs.tnllabs.com/og-cover.png">
<meta property="og:image:secure_url" content="https://labs.tnllabs.com/og-cover.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="TNL LABS — a workshop for artists, designers and musicians">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="TNL LABS — Cultivators">
<meta name="twitter:description" content="Artists, designers, musicians, entrepreneurs. Creatives don't just meet here — they multiply.">
<meta name="twitter:image" content="https://labs.tnllabs.com/og-cover.png">
<meta name="description" content="A workshop for artists, designers, musicians and entrepreneurs. Post work, collaborate, and sell — collaboration is the product.">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TNLLABS">
<link rel="apple-touch-icon" href="/icon-512.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#000;--card:#0A0A0A;--el:#141414;--line:rgba(255,255,255,.12);--line2:rgba(255,255,255,.28);
--tx:#fff;--dim:#8A8A8A;--green:#22C55E;}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{background:var(--bg);color:var(--tx);font-family:'Archivo',system-ui,sans-serif;overflow:hidden}
.mono{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em}
.dim{color:var(--dim)}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
h1,h2,h3{text-transform:uppercase;letter-spacing:-.01em}
.app{height:100dvh;display:flex;flex-direction:column}
/* controls */
.in{width:100%;background:var(--el);border:1px solid var(--line);border-radius:9px;color:var(--tx);padding:11px 13px;font-size:14px}
.in:focus{outline:none;border-color:var(--line2)}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--tx);color:#000;border:none;border-radius:9px;padding:10px 15px;font-weight:700;font-size:13px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.wide{width:100%;justify-content:center;padding:13px;margin-top:16px}
.btn.ghost{background:transparent;color:var(--tx);border:1px solid var(--line2)}
.btn.green{background:var(--green)}
.link{background:none;border:none;color:var(--dim);font-size:12px;margin-top:12px}
.err{color:#F87171;font-size:12px;margin-top:10px;font-family:'IBM Plex Mono',monospace}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--el);border:1px solid var(--line);color:var(--tx);border-radius:999px;padding:8px 13px;font-size:12px}
.chip.on{background:var(--tx);color:#000;border-color:var(--tx)}
/* auth */
.gate{height:100dvh;display:flex;justify-content:center;padding:22px;padding-bottom:calc(22px + env(safe-area-inset-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch}
.gatecard{width:100%;max-width:400px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 24px;margin:auto}
.brand{font-weight:900;font-size:14px;letter-spacing:.03em}
.brand .fl{font-size:.9em}
.gate h1{font-size:28px;font-weight:900;margin:18px 0 8px}
.gate p{font-size:13px;line-height:1.6;color:var(--dim);margin-bottom:14px}
.lbl{display:block;margin:13px 0 6px;color:var(--dim)}
.roles{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.switch{text-decoration:underline;cursor:pointer;color:var(--tx)}
/* top bar */
.top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line)}
.top-user{display:flex;align-items:center;gap:7px;background:var(--el);border:1px solid var(--line);color:var(--tx);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700}
.udot{width:7px;height:7px;border-radius:50%;background:var(--green)}
/* nav */
.nav{display:flex;border-top:1px solid var(--line);background:var(--card)}
.navb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--dim);padding:10px 0 12px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em}
.navb.on{color:var(--tx)}
.navb.on .ic{color:var(--green)}
.ic{font-size:17px;line-height:1;font-style:normal;display:flex;align-items:center;justify-content:center}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
/* landing */
.hero{padding:56px 22px 28px;border-bottom:1px solid var(--line)}
.hero .eyebrow{color:var(--green);letter-spacing:.16em;margin-bottom:16px}
.hero h1{font-size:clamp(38px,10vw,72px);font-weight:900;line-height:.93;margin-bottom:18px}
.hero p{font-size:14px;line-height:1.65;color:#C4C4C4;max-width:500px;margin-bottom:22px}
.ctas{display:flex;gap:10px;flex-wrap:wrap}
.sec{padding:26px 22px;border-bottom:1px solid var(--line)}
.sec-h{color:var(--dim);letter-spacing:.14em;margin-bottom:14px;display:flex;justify-content:space-between;align-items:baseline}
.sec-h button{background:none;border:none;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em}
.sec-h button:hover{color:var(--green)}
.labgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px}
.labcard{text-align:left;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px;color:var(--tx)}
.labcard:hover{border-color:var(--line2)}
.labcard .k{color:var(--green);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em}
.labcard .n{font-weight:900;font-size:15px;margin-top:18px}
.labcard .l{font-size:12px;color:var(--dim);line-height:1.5;margin-top:4px}
.foot{padding:32px 22px 40px}
.foot .big{font-weight:900;font-size:clamp(15px,4vw,20px);text-transform:uppercase;margin-bottom:6px}
/* labs view */
/* ── THE LABS AS A BUILDING ──────────────────────────────────────────
   Tiles, not a list. Each one shows the last thing made in it, so you're
   looking INTO a room rather than reading a menu of hashtags. */
.labgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 20px 20px}
@media(min-width:620px){.labgrid{grid-template-columns:repeat(3,1fr)}}
.labtile{position:relative;aspect-ratio:1/1.15;border-radius:14px;overflow:hidden;
  background:var(--card);border:1px solid var(--line);padding:0;text-align:left;
  display:flex;flex-direction:column;justify-content:space-between;color:var(--tx);
  transition:border-color .15s,transform .1s}
.labtile:active{transform:scale(.985)}
.labtile.hasnew{border-color:var(--green)}
.labtile.live{border-color:var(--line2)}
/* the last piece made in there — sits behind, dimmed, so the room has a face */
.labart{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.3;filter:grayscale(.4)}
.labshade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.82) 55%,#000 100%)}
.labtop,.labbody,.labfoot{position:relative;z-index:1}
.labtop{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 11px 0}
.labglyph{font-size:19px;color:var(--green);line-height:1}
.labnew{background:var(--green);color:#000;font-size:7px;font-weight:600;letter-spacing:.08em;padding:3px 5px;border-radius:4px}
.labdot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.labbody{padding:0 11px}
.labname{font-size:15px;font-weight:900;letter-spacing:-.3px;line-height:1.1}
.labfor{font-size:10.5px;line-height:1.4;color:var(--dim);margin-top:3px}
.labrooms{font-size:7.5px;letter-spacing:.04em;color:var(--dim);opacity:.65;margin-top:6px;line-height:1.5;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.labfoot{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:9px 11px 11px}
/* who's been in there — a room with nobody in it is a corridor */
.labppl{display:flex;align-items:center}
.labppl img,.labppl span{width:17px;height:17px;border-radius:50%;object-fit:cover;border:1.5px solid #000;
  margin-left:-5px;background:var(--el);font-size:7px;display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;color:var(--dim)}
.labppl img:first-child,.labppl span:first-child{margin-left:0}
.labppl em{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--dim);margin-left:4px;font-style:normal}
.labmeta{font-size:7.5px;letter-spacing:.04em;color:var(--dim);text-align:right;line-height:1.3}
.labhint{text-align:center;padding:0 20px 26px;letter-spacing:.12em;font-size:8px}
/* inside a lab */
.railtool{display:flex;gap:10px;align-items:center;width:100%;text-align:left;background:color-mix(in srgb,var(--green) 9%,transparent);border:1px solid var(--green);border-radius:12px;padding:11px 12px;margin:0 0 10px;color:var(--tx);cursor:pointer}
.railtool-ic{color:var(--green);display:flex}
.railback{width:100%;background:none;border:none;color:var(--dim);text-align:left;padding:12px 14px 8px;font-size:12px;font-family:'Archivo'}
.railback:hover{color:var(--green)}
.railtitle{display:flex;gap:9px;align-items:flex-start;padding:0 14px 12px;border-bottom:1px solid var(--line);margin-bottom:8px}
.railtitle b{font-size:13px;letter-spacing:-.2px}
.railglyph{font-size:16px;color:var(--green);line-height:1.2}
.roomlab{color:var(--dim);font-size:8px;letter-spacing:.1em;margin-right:6px}
.labs-wrap{flex:1;display:flex;overflow:hidden}
.rail{width:190px;flex-shrink:0;border-right:1px solid var(--line);overflow-y:auto;padding:12px 8px;background:var(--card)}
.railh{color:var(--dim);padding:4px 8px;margin-top:8px}
.railc{display:flex;align-items:center;gap:7px;width:100%;background:none;border:none;color:var(--dim);padding:7px 8px;border-radius:7px;font-size:13px;text-align:left;font-family:'Archivo'}
.railc:hover,.railc.on{background:var(--el);color:var(--tx)}
.room{flex:1;display:flex;flex-direction:column;min-width:0}
.roomh{display:flex;align-items:center;gap:8px;padding:11px 15px;border-bottom:1px solid var(--line);font-weight:700;font-size:14px}
.roomh .desc{font-weight:400;font-size:11px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* feed */
.feed{flex:1;overflow-y:auto;padding:14px 15px;display:flex;flex-direction:column;gap:10px}
.post{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 13px}
.post-h{display:flex;align-items:center;gap:9px}
.av{width:32px;height:32px;border-radius:50%;background:var(--el);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:10px;flex-shrink:0;cursor:pointer}
.post-by{font-weight:700;font-size:13px;cursor:pointer}
.post-by:hover{color:var(--green)}
.lvl{background:var(--green);color:#000;font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 5px;border-radius:4px;margin-left:5px}
.post-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.06em}
.post-body{font-size:14px;line-height:1.55;color:#E5E2DA;margin:8px 0 2px;word-break:break-word}
.shared-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--green);letter-spacing:.08em;margin-bottom:5px}
.post-acts{display:flex;align-items:center;gap:20px;margin-top:11px}
.igact{background:none;border:0;padding:0;color:var(--tx);display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.igact svg{width:25px;height:25px;stroke:currentColor;fill:none;stroke-width:1.7;transition:transform .12s ease}
.igact:active svg{transform:scale(.85)}
.igact.on{color:var(--green)}
.igact.on svg{fill:var(--green);stroke:var(--green)}
.igact-n{color:var(--dim);font-size:12px;min-width:6px}
.post-acts2{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
.ig-viewc{background:none;border:0;color:var(--dim);font-size:13px;padding:8px 0 0;cursor:pointer;font-family:inherit;text-align:left}
.ig-viewc:hover{color:var(--tx)}
.ui-ov{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);animation:uifade .15s ease}
@keyframes uifade{from{opacity:0}to{opacity:1}}
.ui-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line2);border-radius:18px;padding:22px;animation:uipop .18s cubic-bezier(.2,.9,.3,1.15)}
@keyframes uipop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.ui-title{font-size:18px;font-weight:800;letter-spacing:-.01em;line-height:1.2}
.ui-body{margin-top:8px;font-size:14px;line-height:1.5;color:var(--dim);white-space:pre-line}
.ui-in{width:100%;margin-top:14px;background:var(--el);border:1px solid var(--line);border-radius:12px;padding:13px 14px;color:var(--tx);font-size:16px;font-family:inherit}
.ui-in:focus{outline:none;border-color:var(--green)}
.ui-btns{display:flex;gap:10px;margin-top:18px}
.ui-btn{flex:1;border-radius:12px;padding:12px;font-weight:700;font-size:14px;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--tx)}
.ui-cancel{color:var(--dim)}
.ui-ok{background:var(--green);color:#000;border-color:var(--green)}
.ui-danger{background:#ef4444;border-color:#ef4444;color:#fff}
.act{display:inline-flex;align-items:center;gap:5px;background:var(--el);border:1px solid var(--line);color:var(--dim);border-radius:999px;padding:3px 11px;font-size:11px;font-family:'IBM Plex Mono',monospace}
.act:hover{border-color:var(--green);color:var(--green)}
.act.on{border-color:var(--green);color:var(--green);background:color-mix(in srgb, var(--green) 12%, transparent)}
.collab-row{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.ctag{font-family:'IBM Plex Mono',monospace;font-size:9px;border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--dim)}
.ctag.acc{border-color:var(--green);color:var(--green)}
.composer{display:flex;gap:8px;padding:11px 15px 13px;border-top:1px solid var(--line)}
.composer .in{flex:1}
.send{width:44px;background:var(--tx);color:#000;border:none;border-radius:9px;font-weight:900}
.send:disabled{opacity:.3}
/* beat lab */
.beat{border:1px solid var(--line);border-radius:14px;margin:14px 15px;padding:16px;background:var(--card)}
.beat-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.beat-h{font-weight:900;font-size:15px;text-transform:uppercase;margin-top:2px}
.beat-ctl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.circle{width:38px;height:38px;border-radius:50%;border:none;background:var(--tx);color:#000;font-size:14px}
.circle.on{background:var(--green)}
.beat-ctl input[type=range]{accent-color:var(--green);width:88px}
.sq{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--el);color:var(--dim)}
.grid{display:flex;flex-direction:column;gap:6px}
.grow{display:flex;align-items:center;gap:9px}
.tname{width:40px;flex-shrink:0;color:var(--dim)}
.cells{display:grid;grid-template-columns:repeat(16,1fr);gap:3px;flex:1}

.cell.bar{border-color:var(--line2)}
.cell.on{background:var(--tx);border-color:var(--tx)}
.cell.now{outline:2px solid var(--green);outline-offset:-1px}
.beat-pub{display:flex;gap:8px;margin-top:14px}
.beat-pub .in{flex:1}
.beatmsg{display:flex;align-items:center;gap:10px;background:var(--el);border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-top:8px}
.beatmsg .nm{font-weight:700;font-size:12px}
/* market */
.shop{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:0 22px 28px}
.prod{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;text-decoration:none;color:var(--tx);display:block}
.prod:hover{border-color:var(--line2)}
.prod-img{aspect-ratio:1/1;background:var(--el);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:var(--dim)}
.prod-n{font-size:12.5px;font-weight:700;padding:9px 11px 2px}
.prod-p{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:0 11px 11px;display:block}
.was{text-decoration:line-through;color:var(--dim);margin-right:6px}
.page-head{padding:24px 22px 12px}
.page-head h2{font-size:26px;font-weight:900;margin:4px 0}
.page-head p{color:var(--dim);font-size:13px;line-height:1.6}
/* profile sheet */
.sheet{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;justify-content:flex-end;z-index:60}
.sheetc{width:100%;max-width:390px;height:100%;background:var(--card);border-left:1px solid var(--line);overflow-y:auto;padding:22px 20px 50px}
.sheeth{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.sheeth h2{font-size:19px;font-weight:900}
.x{background:none;border:none;color:var(--tx);opacity:.6;font-size:18px}
.pid{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pav{width:50px;height:50px;border-radius:50%;background:var(--el);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:14px}
.pname{font-weight:900;font-size:16px}
.plvl{background:var(--el);border-radius:12px;padding:13px;margin-bottom:16px}
.plr{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.pbadge{background:var(--green);color:#000;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:4px 8px;border-radius:6px}
.ptrack{height:6px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden}
.pfill{height:100%;background:var(--green);transition:width .3s}
.ladder{display:flex;flex-direction:column;gap:4px;margin:14px 0}
.lstep{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 2px;opacity:.4}
.lstep.done{opacity:1}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
.lstep.done .ldot{background:var(--green)}
.lstep span:nth-child(3){flex:1}
/* portfolio */
.pbio{font-size:13.5px;line-height:1.6;color:#D6D2C8;margin:2px 0 8px;white-space:pre-wrap}
.plink{display:inline-block;color:var(--green);text-decoration:none;margin-bottom:12px;letter-spacing:.06em}
.pstats{display:flex;gap:6px;margin:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px 0}
.pstat{flex:1;display:flex;flex-direction:column;gap:3px}
.pstat b{font-size:17px;font-weight:900}
.pactions{display:flex;gap:8px;margin-bottom:14px}
.pactions .btn{flex:1;justify-content:center}
.ptabs{display:flex;gap:6px;margin:14px 0 10px}
.ptab{flex:1;background:var(--el);border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:8px 4px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em}
.ptab.on{background:var(--tx);color:#000;border-color:var(--tx)}
.worklist{display:flex;flex-direction:column;gap:9px}
.work{background:var(--el);border:1px solid var(--line);border-radius:10px;padding:10px 11px;cursor:pointer}
.work:hover{border-color:var(--line2)}
.work-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:6px}
.work-kind{color:var(--green);letter-spacing:.08em}
.work-collab{color:var(--dim)}
.work-body{font-size:13px;line-height:1.5;color:#D6D2C8;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.work-beat{display:flex;align-items:center;gap:8px}
.work-beat .nm{font-size:12.5px;font-weight:700}
.work-foot{display:flex;gap:10px;align-items:center;margin-top:8px;color:var(--dim);font-size:9px;flex-wrap:wrap}
.work-cnames{color:var(--green)}
textarea.in{resize:vertical;line-height:1.5}

.srow{display:flex;gap:10px}
.srow>div{flex:1}
.wide{width:100%;justify-content:center;margin-top:18px}
.ordrow{display:flex;gap:11px;padding:12px 0;border-bottom:1px solid var(--line);align-items:flex-start;flex-wrap:wrap}

.unpaid{font-size:11px;line-height:1.5;color:#FBBF24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.35);border-radius:7px;padding:6px 9px;margin-top:6px}
.st-paid,.st-shipped{color:var(--green)}
.st-complete{color:var(--dim)}
.ordaddr{margin-top:5px;font-size:9px;line-height:1.5}
/* payouts */
.paybar{display:flex;align-items:center;justify-content:space-between;gap:12px;background:color-mix(in srgb, var(--green) 9%, transparent);border:1px solid color-mix(in srgb, var(--green) 35%, transparent);border-radius:11px;padding:12px 14px;margin-bottom:16px;flex-wrap:wrap}
.paybar.off{background:var(--el);border-color:var(--line)}

/* studio */

.st-play{width:56px;height:56px;border-radius:50%;border:none;background:var(--tx);color:#000;font-size:19px;flex-shrink:0}
.st-play.on{background:var(--green)}
.st-rec{width:48px;height:48px;border-radius:50%;border:1px solid #7f1d1d;background:#1c0b0b;color:#F87171;font-size:16px;flex-shrink:0}
.st-rec.on{background:#dc2626;color:#fff;border-color:#dc2626}
.st-rec.on{background:#F87171;color:#fff;border-color:#F87171;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.45}}
.st-name{flex:1;min-width:110px;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--tx);font-family:'Archivo';font-weight:900;font-size:15px;text-transform:uppercase;padding:4px 0}
.st-name:focus{outline:none;border-color:var(--green)}
.st-knobs{display:flex;gap:12px;flex-wrap:wrap}

.st-knobs input{accent-color:var(--green);width:56px}
.st-knobs b{color:var(--tx);min-width:22px;font-size:10px}
.st-mini{display:flex;gap:4px;margin-left:auto}
.st-ic{width:28px;height:28px;border-radius:7px;border:1px solid var(--line);background:var(--el);color:var(--dim);font-size:12px;padding:0}

.st-ic.on{background:var(--green);color:#000;border-color:var(--green)}
.st-ic:disabled{opacity:.3}
.st-bar2{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 0;border-bottom:1px solid var(--line)}
.st-bars{display:flex;align-items:center;gap:4px}
.st-b{width:24px;height:24px;border-radius:5px;border:1px solid var(--line);background:var(--el);color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:0}
.st-b.on{background:var(--tx);color:#000;border-color:var(--tx)}
.st-bar2 select{background:var(--el);border:1px solid var(--line);color:var(--tx);border-radius:6px;padding:4px 6px;font-family:'IBM Plex Mono',monospace;font-size:10px}
.st-views{display:flex;gap:4px;margin-left:auto}
.st-v{padding:5px 11px;border-radius:6px;border:1px solid var(--line);background:var(--el);color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em}
.st-v.on{background:var(--tx);color:#000;border-color:var(--tx)}
.st-tracks{display:flex;gap:5px;overflow-x:auto;padding:10px 0}
.st-t{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:var(--el);color:var(--dim)}
.st-t.on{border-color:var(--green);color:var(--tx);background:color-mix(in srgb, var(--green) 10%, transparent)}
.st-t.dim{opacity:.35}
.st-tn{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em}
.st-tk{font-size:8px;opacity:.6}
.st-seq{padding:6px 0}
.st-grid{display:flex;flex-direction:column;gap:5px}
.st-row{display:flex;align-items:center;gap:8px}
.st-row.sel .st-rl{color:var(--green)}
.st-rl{width:46px;flex-shrink:0;background:none;border:none;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.05em;text-align:left;padding:0}
.st-cells{display:grid;grid-template-columns:repeat(16,1fr);gap:3px;flex:1}
.st-c{aspect-ratio:1/1;border-radius:3px;border:1px solid var(--line);background:var(--el);padding:0;touch-action:none;min-height:16px}
.st-c.g1{background:#0c0c0c;border-color:rgba(255,255,255,.07)} /* FL's alternating beat blocks — you read the bar in 4s at a glance */
.st-c.bt{border-color:var(--line2)}
.st-c.on.v1{background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.4)}
.st-c.on.v2{background:rgba(255,255,255,.68);border-color:rgba(255,255,255,.75)}
.st-c.on.v3{background:#fff;border-color:#fff;box-shadow:0 0 6px rgba(255,255,255,.45)}
.st-c.now{outline:2px solid var(--green);outline-offset:-1px}
.st-rollhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.st-oct{display:flex;align-items:center;gap:6px}
.st-roll{display:flex;flex-direction:column;gap:2px;max-height:44vh;overflow-y:auto;padding-right:3px}
.st-rr{display:flex;align-items:center;gap:8px}
.st-key{width:46px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--dim)}
.st-key.blk{opacity:.5}
.st-rr .st-c{min-height:13px}
.st-vars{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.st-chip{padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:var(--el);color:var(--dim);font-size:11px}
.st-chip.on{background:var(--tx);color:#000;border-color:var(--tx)}
.st-hint{margin-top:10px;font-size:8px;letter-spacing:.05em}
.st-mix{display:flex;flex-direction:column;gap:10px;padding:12px 0}
.st-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px}
.st-card.mutedcard{opacity:.5}
.st-cr1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.st-cname{font-weight:700;font-size:14px}
.st-cms{display:flex;gap:6px}
.st-mb2{width:36px;height:28px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--dim);font-size:12px;font-weight:800;padding:0}
.st-mb2.on{background:var(--green);color:#000;border-color:var(--green)}
.st-cr2{display:flex;align-items:center;gap:11px;color:var(--dim)}
.st-hfader{flex:1;height:32px;accent-color:var(--green)}
.st-cr3{display:flex;align-items:center;gap:9px;margin-top:7px;color:var(--dim);font-size:10px;font-family:'IBM Plex Mono',monospace}
.st-hpan{flex:1;accent-color:var(--dim)}
.st-strip{flex-shrink:0;width:56px;display:flex;flex-direction:column;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 5px}
.st-master{border-color:var(--green)}
.st-sn{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--dim);letter-spacing:.05em}
.st-fader{writing-mode:vertical-lr;direction:rtl;width:20px;height:96px;accent-color:var(--green)}
.st-pan{display:flex;flex-direction:column;align-items:center;gap:2px}
.st-pan input{width:44px;accent-color:var(--dim)}
.st-pan span{font-size:7px}
.st-ms{display:flex;gap:3px}
.st-mb{width:18px;height:16px;border-radius:3px;border:1px solid var(--line);background:transparent;color:var(--dim);font-size:7px;padding:0}
.st-mb.on{background:var(--green);color:#000;border-color:var(--green)}
.st-fx{padding:14px 0;display:flex;flex-direction:column;gap:9px;max-width:420px}
.st-f{display:flex;align-items:center;gap:9px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--dim)}
.st-f input{flex:1;accent-color:var(--green)}
.st-f b{color:var(--tx);min-width:44px;text-align:right;font-size:10px}
.st-foot{display:flex;gap:7px;margin-top:16px;flex-wrap:wrap}
.st-btn{flex:1;min-width:88px;justify-content:center;background:var(--el);border:1px solid var(--line);color:var(--tx);border-radius:9px;padding:10px;font-size:12px;font-weight:700}
.st-btn:hover{border-color:var(--green)}
.st-btn.green{background:var(--green);color:#000;border-color:var(--green)}
.st-drafts{margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
.st-draft{display:flex;align-items:center;gap:8px;padding:6px 0}
.st-dn{flex:1;background:none;border:none;color:var(--tx);text-align:left;font-family:'Archivo';font-size:13px;font-weight:700}
.st-dn:hover{color:var(--green)}
/* loading skeletons — something on screen the instant you tap */
@keyframes shim{0%{opacity:.35}50%{opacity:.7}100%{opacity:.35}}
.work.skel{pointer-events:none}
.skelbar{height:11px;border-radius:5px;background:var(--el);animation:shim 1.1s infinite}
.skelbar.sh{width:58%;margin-top:8px}
.skelbtn{height:38px;border-radius:9px;background:var(--el);animation:shim 1.1s infinite;flex:1}
.pstats.sk b{color:var(--dim)}
/* unread indicators */
.railc{position:relative}
.railc.unread{color:var(--tx);font-weight:700}
.railc.unread::before{content:"";position:absolute;left:-4px;top:50%;transform:translateY(-50%);width:3px;height:14px;border-radius:2px;background:var(--green)}
.cbadge{margin-left:auto;background:var(--green);color:#000;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0}
/* mentions + links */
.mention{color:var(--green);font-weight:700;cursor:pointer}
.mention:hover{text-decoration:underline}
.lnk{color:var(--green);text-decoration:none;word-break:break-all}
.lnk:hover{text-decoration:underline}
.lcard{display:flex;align-items:center;gap:10px;background:var(--el);border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-top:8px;text-decoration:none;color:var(--tx)}
.lcard:hover{border-color:var(--green)}
.lfav{width:26px;height:26px;border-radius:6px;flex-shrink:0;background:var(--card)}
.lcard-t{font-size:12.5px;font-weight:700}
.lcard-go{margin-left:auto;color:var(--dim);font-size:12px}
.lcard.yt{position:relative;padding:0;display:block;overflow:hidden;aspect-ratio:16/9}
.lcard.yt img{width:100%;height:100%;object-fit:cover;display:block}
.lcard-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;background:rgba(0,0,0,.3)}
.lcard-host{position:absolute;bottom:7px;left:9px;color:#fff;font-size:8px;letter-spacing:.12em;text-shadow:0 1px 3px #000}
/* mention autocomplete */
.mlist{border-top:1px solid var(--line);background:var(--card);max-height:180px;overflow-y:auto}
.mrow{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;color:var(--tx);padding:8px 15px;text-align:left;font-size:13px}
.mrow:hover{background:var(--el)}
/* picker */
.pick{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:flex-end;justify-content:center;z-index:70}
@media(min-width:620px){.pick{align-items:center}}
.pickc{width:100%;max-width:440px;max-height:78vh;background:var(--card);border:1px solid var(--line);border-radius:16px 16px 0 0;padding:20px;overflow-y:auto}
@media(min-width:620px){.pickc{border-radius:16px}}
.pickh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pickh h2{font-size:19px;font-weight:900;margin-top:3px}
.picknote{line-height:1.6;margin-bottom:12px}
.picklist{display:flex;flex-direction:column;gap:2px;margin-top:10px}
.pickrow{display:flex;align-items:center;gap:10px;background:none;border:none;color:var(--tx);padding:10px 6px;border-radius:8px;text-align:left;width:100%}
.pickrow:hover{background:var(--el)}
.pickic{width:32px;height:32px;border-radius:50%;background:var(--el);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);flex-shrink:0}
.pickbody{min-width:0;flex:1}
.pickbody b{font-size:13.5px}
/* empty states */
.estate{padding:34px 20px}
.eh{font-family:'Archivo',sans-serif;font-weight:900;font-size:17px;text-transform:uppercase;color:var(--tx);margin-bottom:6px}
.ep{font-size:13px;line-height:1.6;max-width:280px;margin:0 auto 16px}
/* optimistic states */
.post.pending{opacity:.62}
.post.failed{border-color:#F87171}
.crow.pending{opacity:.55}
.sending{color:var(--green);font-size:8px;letter-spacing:.12em;margin-bottom:5px}
.failbar{display:flex;align-items:center;gap:8px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.4);border-radius:8px;padding:7px 10px;margin-bottom:8px;font-size:12px;flex-wrap:wrap}
.retryb{background:#F87171;color:#000;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;margin-left:auto}
.retryb.ghost{background:transparent;color:var(--dim);border:1px solid var(--line);margin-left:0}
/* images: reserve space so the feed doesn't jump while loading */
.post-img{background:var(--el)}
.sr-img{background:var(--el)}
img.post-img,img.sr-img{height:auto}
/* commission rate */
.ratebar{display:flex;align-items:center;gap:14px;background:linear-gradient(90deg,color-mix(in srgb, var(--green) 12%, transparent),transparent);border:1px solid color-mix(in srgb, var(--green) 30%, transparent);border-radius:11px;padding:13px 14px;margin-bottom:10px;flex-wrap:wrap}
.ratenow{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.ratenow b{font-size:26px;font-weight:900;color:var(--green);line-height:1}
.ratenow span{margin-top:3px;font-size:7px;letter-spacing:.1em}
.rateinfo{flex:1;min-width:150px}
.rateinfo .mono{font-size:8px;line-height:1.5;letter-spacing:.05em}
.ratenext{font-size:12px;font-weight:700;margin-top:5px}
.ratenext b{color:var(--green)}
.ratelad{background:none;border:none;color:var(--dim);font-size:9px;letter-spacing:.08em;padding:0}
.ratelad:hover{color:var(--green)}
/* profile work: visual trades get a grid, sound/word/build get a list */
.worklist.asgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:520px){.worklist.asgrid{grid-template-columns:repeat(3,1fr)}}
.worklist.asgrid .work{padding:0;overflow:hidden}
.worklist.asgrid .work-top{padding:8px 9px 0}
.worklist.asgrid .work-img{max-height:none;aspect-ratio:1/1;border-radius:0}
.worklist.asgrid .work-body{padding:0 9px;font-size:11.5px;-webkit-line-clamp:2}
.worklist.asgrid .work-foot{padding:6px 9px 8px;margin-top:4px}
.worklist.asgrid .work-beat{padding:9px}
/* market: trust + filters + similar */
.trust{font-size:9px;letter-spacing:.06em;margin-top:3px;color:var(--dim)}
.star{color:#FBBF24}
.protect{background:color-mix(in srgb, var(--green) 8%, transparent);border:1px solid color-mix(in srgb, var(--green) 28%, transparent);border-radius:8px;padding:8px 10px;margin-top:10px;font-size:8.5px;letter-spacing:.06em;color:var(--green);line-height:1.5}
.clearf{background:none;border:none;color:var(--dim);font-size:9px;letter-spacing:.08em;padding:4px 0;text-align:left}
.clearf:hover{color:var(--red)}
.simwrap{margin-top:30px;border-top:1px solid var(--line);padding-top:18px}
.sim-h{letter-spacing:.12em;margin-bottom:10px}
.simrow{display:flex;gap:9px;overflow-x:auto;padding-bottom:6px}
.simcard{flex-shrink:0;width:112px;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;padding:0;text-align:left;color:var(--tx)}
.simcard:hover{border-color:var(--green)}
.simcard img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--el)}
.simt{font-size:11px;font-weight:700;padding:7px 8px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.simp{font-size:12px;font-weight:900;padding:2px 8px 8px}
/* reviews */
.revitem{display:flex;gap:10px;align-items:center;background:var(--el);border-radius:10px;padding:10px}
.stars{display:flex;gap:5px}
.star-btn{background:none;border:none;font-size:30px;color:var(--line2);padding:0;line-height:1}
.star-btn.on{color:#FBBF24}
/* autoplaying feed video */
.vwrap{position:relative;margin-top:8px}
.vwrap .post-vid{margin-top:0}
.vplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;border-radius:50%;background:rgba(0,0,0,.65);border:1px solid var(--line2);color:#fff;font-size:18px;backdrop-filter:blur(4px);padding:0}
.vplay:active{transform:translate(-50%,-50%) scale(.94)}
.vmute{position:absolute;bottom:9px;right:9px;width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.6);border:1px solid var(--line2);color:#fff;font-size:13px;
  backdrop-filter:blur(4px);padding:0;line-height:1}
.vmute:active{transform:scale(.92)}
video[data-auto]{cursor:pointer}
.sr-card .vwrap{margin:0}
/* your sounds */
.st-sounds{margin-top:12px;border-top:1px solid var(--line);padding-top:12px}
.st-sh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.st-sh b{font-size:14px}
.st-kit{margin-top:12px}

<script>
/* Registered before everything else so it can catch a failure in the main
   script itself. A white-on-black stack trace beats a black rectangle:
   without this, ANY error at load looks identical to a dead server. */
(function(){
  var shown=false;
  function crash(what,where){
    if(shown)return; shown=true;
    /* Tell the server. Otherwise a crash only exists if the person who hit
       it bothers to screenshot it — and most people just leave. */
    try{
      fetch("/api/client-error",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:String(what).slice(0,400),detail:String(where||"").slice(0,400),path:location.pathname})}).catch(function(){});
    }catch(e){}
    try{
      document.getElementById("app").innerHTML=
        '<div style="padding:28px;font-family:-apple-system,Helvetica,sans-serif;color:#fff">'+
        '<div style="color:#22C55E;font-family:monospace;font-size:11px;letter-spacing:.16em">TNLLABS &#129514;</div>'+
        '<h1 style="font-size:20px;margin:16px 0 8px;text-transform:uppercase">Something broke</h1>'+
        '<p style="color:#8A8A8A;font-size:13px;line-height:1.6;margin-bottom:14px">'+
        'The app hit an error while loading. This is a bug, not you.</p>'+
        '<pre style="background:#141414;border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:12px;'+
        'font-size:11px;color:#F87171;white-space:pre-wrap;word-break:break-word;overflow:auto;max-height:40vh">'+
        String(what)+(where?"\n\n"+where:"")+'</pre>'+
        '<button onclick="(async()=>{try{if(window.caches){for(const k of await caches.keys())await caches.delete(k)}'+
        'if(navigator.serviceWorker){const rs=await navigator.serviceWorker.getRegistrations();for(const r of rs)await r.unregister()}}'+
        'catch(e){};location.reload(true)})()" '+
        'style="margin-top:14px;background:#fff;color:#000;border:none;border-radius:9px;padding:12px 20px;font-weight:700;font-size:14px">'+
        'Clear cache &amp; reload</button>'+
        '<p style="color:#5A5A5A;font-size:11px;margin-top:14px;line-height:1.6">'+
        'If this persists, screenshot this message — it says exactly what went wrong.</p></div>';
    }catch(e){ document.body.innerHTML="<pre style=\"color:#fff;padding:20px\">"+String(what)+"</pre>" }
  }
  /* Only fire for things that actually break the app. Media playback throws
     constantly and harmlessly: AbortError every time a play() is interrupted
     by a scroll or a re-render, NotAllowedError when autoplay is blocked.
     Showing a crash screen for those is worse than showing nothing. */
  function benign(err){
    var n = (err && err.name) || "";
    var m = String((err && err.message) || err || "");
    return n==="AbortError" || n==="NotAllowedError" || n==="NotSupportedError"
      || /operation was aborted|play\(\) request|interrupted by|removed from the document|user denied|load failed/i.test(m);
  }
  window.addEventListener("error",function(e){
    if(benign(e.error)) return;
    // an <img>/<video> that 404s fires error on the ELEMENT, not the window
    if(e.target && e.target !== window && e.target.tagName) return;
    crash(e.message||e.error, e.filename?(e.filename.split("/").pop()+":"+e.lineno+":"+e.colno):"");
  }, true);
  window.addEventListener("unhandledrejection",function(e){
    if(benign(e.reason)) { e.preventDefault(); return; }
    crash((e.reason&&e.reason.message)||e.reason,"unhandled promise rejection");
  });
})();
</script>

  let h=esc(t);
  h=h.replace(/(https?:\/\/[^\s<]+)/g,(u)=>`<a class="lnk" href="${u}" target="_blank" rel="noreferrer nofollow">${u.replace(/^https?:\/\//,"").slice(0,42)}${u.length>50?"…":""}</a>`);

  return h;
}

/* ── SENTRY (client) ─────────────────────────────────────────────────

   no more debugging from dark screen recordings. DSNs are public by design. */
const SENTRY_DSN="https://dd32635170e2123131bb2583d08e2aed@o4511775840468992.ingest.us.sentry.io/4511775846957056";
const _sentSeen=new Set();
function sentryClient(msg,stack,where){
  try{
    if(_sentSeen.size>=8||_sentSeen.has(msg))return;_sentSeen.add(msg);
    const m=/^https:\/\/([a-f0-9]+)@([^/]+)\/(\d+)$/.exec(SENTRY_DSN);if(!m)return;
    const ev={timestamp:Date.now()/1000,platform:"javascript",level:"error",
      tags:{where:where||"web",user:(typeof ME!=="undefined"&&ME)?ME.username:"guest"},
      request:{url:location.href},
      exception:{values:[{type:"Error",value:String(msg).slice(0,500)}]},
      extra:{stack:String(stack||"").slice(0,4000),ua:navigator.userAgent}};
    const env=JSON.stringify({dsn:SENTRY_DSN,sent_at:new Date().toISOString()})+"\n"+
      JSON.stringify({type:"event"})+"\n"+JSON.stringify(ev)+"\n";
    const url=`https://${m[2]}/api/${m[3]}/envelope/`;
    if(navigator.sendBeacon)navigator.sendBeacon(url,new Blob([env],{type:"application/x-sentry-envelope"}));
    else fetch(url,{method:"POST",body:env,keepalive:true}).catch(()=>{});
    /* Mirror into the app's own intake so the admin Health tab sees member-
       phone errors too — one dashboard, both worlds. */
    try{fetch(API+"/api/client-error",{method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",
      body:JSON.stringify({message:String(msg).slice(0,300),detail:String(stack||"").slice(0,1200),path:location.pathname}),keepalive:true}).catch(()=>{})}catch(e){}
  }catch(e){}
}

    document.body.appendChild(ov);

    if(ins[0])setTimeout(()=>{ins[0].focus();ins[0].select&&ins[0].select()},50);
    const done=v=>{ov.remove();resolve(v)};
    ov.querySelector(".ui-cancel")?.addEventListener("click",()=>done(okOnly?true:null));
    ov.querySelector(".ui-ok").addEventListener("click",()=>done(ins.length?ins.map(i=>i.value):true));
    ov.addEventListener("click",e=>{if(e.target===ov)done(okOnly?true:null)});
    ov.addEventListener("keydown",e=>{if(e.key==="Escape")done(okOnly?true:null);if(e.key==="Enter"&&ins.length<=1){e.preventDefault();ov.querySelector(".ui-ok").click()}});
  });
}

  // already an app? nothing to do.
  if(isStandalone())return "installed";
  try{if(localStorage.getItem("tnl_installed"))return "installed"}catch(e){}

/* ---- images ----
   Phone photos are 5–12MB. Resize to max 1400px and re-encode as JPEG
   before upload so posting is fast and storage stays sane. */
/* Decode once, then emit whatever sizes we need. Returns dimensions so
   the feed can reserve space — an <img> with no width/height is what
   makes a feed jump around while it loads. */
function loadImage(file){
  return new Promise((resolve,reject)=>{
    if(!file.type.startsWith("image/"))return reject(new Error("Not an image"));
    const fr=new FileReader();
    fr.onerror=()=>reject(new Error("Couldn't read that file"));
    fr.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject(new Error("Couldn't decode that image"));
      img.onload=()=>resolve({img,dataUrl:fr.result});
      img.src=fr.result;
    };
    fr.readAsDataURL(file);
  });
}
function resize(img,maxDim,quality){
  let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
  if(w>maxDim||h>maxDim){const s=Math.min(maxDim/w,maxDim/h);w=Math.round(w*s);h=Math.round(h*s)}
  const c=document.createElement("canvas");c.width=w;c.height=h;
  c.getContext("2d").drawImage(img,0,0,w,h);
  return {data:c.toDataURL("image/jpeg",quality),w,h};
}
/* Full-size for the lightbox + a small thumb for the feed. The feed used
   to download every full-res image at once — rough on cellular. */
async function prepImage(file,asWork){
  const {img,dataUrl}=await loadImage(file);
  const W=img.naturalWidth||img.width, H=img.naturalHeight||img.height;
  if(file.type==="image/gif"&&file.size<4*1024*1024)
    return {full:dataUrl,thumb:dataUrl,w:W,h:H,gif:true};
  const full=resize(img,asWork?2400:1600,asWork?.92:.85);
  const thumb=resize(img,700,.72);
  return {full:full.data,thumb:thumb.data,w:full.w,h:full.h};
}
function compressImage(file,maxDim=1400,quality=.82){
  return loadImage(file).then(({img,dataUrl})=>{
    if(file.type==="image/gif"&&file.size<4*1024*1024)return dataUrl;
    return resize(img,maxDim,quality).data;
  });
}

/* Streams the raw file straight to the server — no base64, no giant string
   in memory, and we get real progress. XHR rather than fetch because fetch
   still can't report UPLOAD progress, and a 600MB upload with no feedback
   is indistinguishable from a hang.

   Falls back to the older base64 route if the server doesn't have the
   streaming one yet. Frontend and backend get deployed separately and
   sometimes drift; a photo upload shouldn't just die because of that. */
function uploadStream(fileOrBlob,onProgress){
  return new Promise((resolve,reject)=>{
    const x=new XMLHttpRequest();
    x.open("POST",API+"/api/upload/stream");
    x.setRequestHeader("Content-Type","application/octet-stream");
    if(TOKEN)x.setRequestHeader("Authorization","Bearer "+TOKEN);
    x.upload.onprogress=e=>{if(e.lengthComputable&&onProgress)onProgress(e.loaded/e.total)};
    x.onload=async()=>{
      let d={};try{d=JSON.parse(x.responseText)}catch(e){}
      if(x.status>=200&&x.status<300)return resolve(d);
      if(x.status===404){                     // server predates streaming
        try{return resolve(await uploadB64(fileOrBlob))}catch(e){return reject(e)}
      }
      reject(new Error(uploadError(x.status,d)));
    };
    x.onerror=()=>reject(new Error("Upload failed — check your connection"));
    x.onabort=()=>reject(new Error("Upload cancelled"));
    UPLOADXHR=x;
    x.send(fileOrBlob);
  });
}
/* The old route. Kept only as a safety net for a stale server. */
async function uploadB64(blob){
  const data=await new Promise((res,rej)=>{
    const fr=new FileReader();fr.onerror=()=>rej(new Error("Couldn't read that file"));
    fr.onload=()=>res(fr.result);fr.readAsDataURL(blob);
  });
  return req("/api/upload",{method:"POST",body:{data}});
}
/* Say what actually went wrong. "Upload failed" helps nobody. */
function uploadError(status,d){
  if(d&&d.error){
    if(d.needsVerify)return "Confirm your email first — check your inbox, or hit Resend up top";
    return d.error;
  }
  if(status===401)return "You've been signed out — sign in and try again";
  if(status===403)return "Confirm your email first — check your inbox, or hit Resend up top";
  if(status===413)return "That file's too big";
  if(status===429)return "Too many uploads — give it a minute";
  return "Upload failed ("+status+")";
}
function dataUrlToBlob(d){
  const [meta,b64]=d.split(",");
  const mime=(/data:([^;]+)/.exec(meta)||[])[1]||"application/octet-stream";
  const bin=atob(b64); const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

function readFile(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onerror=()=>rej(new Error("Couldn't read that file"));
    fr.onload=()=>res(fr.result);
    fr.readAsDataURL(file);
  });
}

let es=null;
function startStream(){
  if(es)es.close();
  es=new EventSource(API+"/api/stream");
  const refresh=()=>{if(!ME)return;if(TAB==="labs")loadFeed(true);if(TAB==="showroom")loadShowroom(true);refreshBadges()};
  es.addEventListener("dm",e=>{try{if(!ME)return;const d=JSON.parse(e.data);

  es.addEventListener("comment",e=>{try{const d=JSON.parse(e.data);

}

/* ---- data ---- */
async function loadFeed(force){
  if(guest())return;
  /* Every render() used to refire this — a like cost 2+ round trips and the
     app crawled on phone networks. Fresh-enough data now short-circuits;
     posting, deleting, and live SSE events pass force=true. */
  if(!force && FEEDAT[CH.id] && Date.now()-FEEDAT[CH.id]<8000) return;
  FEEDAT[CH.id]=Date.now();
  try{const d=await api.feed(CH.id);POSTS=d.posts;renderRoomFeed()}catch(e){/* not fatal */}
  // opening a channel clears its dot
  if(UNREADS[CH.id]){delete UNREADS[CH.id];paintUnreads()}
  try{await api.readChannel(CH.id)}catch(e){}
}
function paintUnreads(){
  document.querySelectorAll("[data-ch]").forEach(el=>{
    const n=UNREADS[el.dataset.ch]||0;
    el.classList.toggle("unread",!!n);
    const b=el.querySelector(".cbadge");
    if(n&&!b){const sp=document.createElement("span");sp.className="cbadge";sp.textContent=n>9?"9+":n;el.appendChild(sp)}
    else if(n&&b)b.textContent=n>9?"9+":n;
    else if(!n&&b)b.remove();
  });
}
/* What's alive in each lab. Cheap, and it's the whole reason the grid is
   better than a list — a room with the last thing made in it is a place. */
async function loadLabs(){
  if(!ME)return;
  try{
    const next=await api.labs();
    /* Only replace once we actually have data. A hiccup that returns null
       or an empty shell must not wipe tiles that were alive a second ago —
       that's the "everything says empty — be first" bug. */
    if(next&&(next.byChannel||next.people||next.art)) LABACT=next;
    render();
  }catch(e){/* keep last-known — the grid stays lit, just not refreshed */}
}

async function loadUnreads(){
  if(!ME)return;

/* ================================================================
   HISTORY
   Everything lived in memory, so the back button (and iOS swipe-back)
   exited the whole app instead of closing a sheet. That's the single most
   jarring thing about using this on a phone.
   Anything that feels like "a screen" pushes state; back pops it.

let HISTINIT=false, POPPING=false;
function pushView(kind, val){
  if(POPPING)return;
  const st={kind,val,tab:TAB};
  try{history.pushState(st,"", kind==="profile"?("/u/"+val):kind==="listing"?("/m/"+val):location.pathname);}
  catch(e){/* some in-app browsers block this */}
}
function initHistory(){
  if(HISTINIT)return; HISTINIT=true;
  try{history.replaceState({kind:"root",tab:TAB},"",location.pathname)}catch(e){}
  window.addEventListener("popstate",()=>{
    POPPING=true;
    // close whatever's on top, innermost first — same order a person expects
    if(LIGHTBOX){LIGHTBOX=null}
    else if(PICKER){PICKER=null}
    else if(GATE){GATE=null;GATEWHY=""}
    else if(EDITING){EDITING=false}
    else if(PROFILE){PROFILE=null}
    else if(DMOPEN){DMOPEN=null;DMDATA=null}
    else if(DMOPENPANEL){DMOPENPANEL=false}
    else if(NOTIFOPEN){NOTIFOPEN=false}
    else if(SEARCHOPEN){SEARCHOPEN=false}
    else if(OPENCOMMENTS){OPENCOMMENTS=null}
    else if(TAB==="market"&&MKTVIEW!=="browse"){MKTVIEW="browse";MKTONE=null}
    else if(TAB==="labs"&&ROOMOPEN){ROOMOPEN=false}
    else if(TAB==="labs"&&LAB){LAB=null;loadLabs()}
    else if(TAB!=="showroom"){TAB="showroom"}
    else{POPPING=false;return}   // at the root — let the browser leave
    render();
    POPPING=false;
  });
}

async function openProfile(username){
  // Open the sheet on the same tick as the tap. Waiting for the network
  // before showing anything is what made this feel broken.
  pushView("profile",username);
  SEARCHOPEN=false; DMOPENPANEL=false; NOTIFOPEN=false;
  PTAB="work"; EDITING=false; PROFLISTINGS=null;
  const cached=PROFCACHE.get(username);
  PROFILE=cached||{loading:true,user:{username,displayName:username,avatarUrl:"",role:"",roles:[],rep:0,bio:"",link:"",createdAt:Date.now()},
    followers:0,following:0,youFollow:false,stats:{posts:0,likesReceived:0,collabs:0},posts:[],collabs:[]};
  render();
  try{
    const d=await api.profile(username);
    PROFCACHE.set(username,d);
    if(PROFILE&&PROFILE.user.username===username){PROFILE=d;render()}
  }catch(e){
    if(PROFILE&&PROFILE.user.username===username){PROFILE=null;render();toast(e.message)}
  }
}

function openPicker(cfg){pushView("picker");PICKER=Object.assign({items:[]},cfg);render();}
function closePicker(){PICKER=null;render();}

function wirePicker(){
  const bg=$("#pickbg");if(!bg)return;
  bg.onclick=e=>{if(e.target===bg)closePicker()};
  const x=$("#pickx");if(x)x.onclick=closePicker;
  document.querySelectorAll("[data-pick]").forEach(b=>b.onclick=()=>{
    const it=PICKER.items[+b.dataset.pick];
    const fn=PICKER.onPick;
    closePicker();
    if(fn)fn(it);
  });
  const q=$("#pickq");
  if(q){
    q.focus();
    let t=null;
    q.oninput=()=>{
      PICKER.q=q.value;
      if(!PICKER.onSearch)return;
      clearTimeout(t);
      t=setTimeout(async()=>{
        const mine=PICKER.q;
        PICKER.loading=true;render();
        const items=await PICKER.onSearch(mine);
        if(!PICKER||PICKER.q!==mine)return;
        PICKER.items=items;PICKER.loading=false;render();
      },200);
    };
  }
}

function timeAgo(t){const s=(Date.now()-t)/1000;
  if(s<60)return "JUST NOW";if(s<3600)return Math.floor(s/60)+"M AGO";
  if(s<86400)return Math.floor(s/3600)+"H AGO";if(s<604800)return Math.floor(s/86400)+"D AGO";
  return new Date(t).toLocaleDateString().toUpperCase()}

function wireGate(){
  const gx=$("#gatex");if(gx)gx.onclick=()=>{GATE=null;GATEWHY="";render()};
  let mode=GATE==="login"?"login":"register",step=1,f={displayName:"",username:"",email:"",password:"",roles:[]},err="";
  const body=()=>$("#gatebody");
  function draw(){
    if(mode==="forgot"){body().innerHTML=`
      <h1>Reset password.</h1><p>We'll email you a link. It works for one hour.</p>
      <label class="mono lbl">EMAIL</label><input class="in" id="fe" type="email" placeholder="you@example.com">
      ${err?`<div class="err">${esc(err)}</div>`:""}
      <button class="btn wide" id="fgo">Send reset link</button>
      <p style="margin-top:14px;font-size:12px" class="dim"><span class="switch" id="fb">← Back to login</span></p>`;
      $("#fb").onclick=()=>{mode="login";err="";draw()};
      $("#fgo").onclick=async()=>{
        const em=$("#fe").value.trim();
        if(!/^\S+@\S+\.\S+$/.test(em)){err="Enter a valid email.";return draw()}
        try{const d=await api.forgot(em);
          if(d.resetUrl){body().innerHTML=`<h1>Mail not set up.</h1><p>Email isn't configured yet, so here's your link:</p>
            <a class="btn wide" style="text-decoration:none" href="${esc(d.resetUrl)}">Set new password</a>`;}
          else body().innerHTML=`<h1>Check your email.</h1><p>If that address has an account, a reset link is on the way.</p>`;
        }catch(e){err=e.message;draw()}};
      return}
    if(mode==="login"){body().innerHTML=`
      <h1>Log in.</h1><p>Back to the lab.</p>
      <label class="mono lbl">USERNAME</label><input class="in" id="u" value="${esc(f.username)}">
      <label class="mono lbl">PASSWORD</label><input class="in" id="p" type="password">
      ${err?`<div class="err">${esc(err)}</div>`:""}
      <button class="btn wide" id="go">Enter</button>
      <p style="margin-top:12px;font-size:12px" class="dim"><span class="switch" id="fp">Forgot password?</span></p>
      <p style="margin-top:8px;font-size:12px" class="dim">New here? <span class="switch" id="sw">Create an account</span></p>`;
      $("#fp").onclick=()=>{mode="forgot";err="";draw()};
      $("#go").onclick=async()=>{try{const d=await api.login({username:$("#u").value.toLowerCase(),password:$("#p").value});
        TOKEN=d.token;localStorage.setItem("tnl-token",TOKEN);ME=d.user;GATE=null;GATEWHY="";
        applyAccent(ME.accentHex);startStream();refreshBadges();loadUnreads();render()}catch(e){err=e.message;draw()}};
      $("#sw").onclick=()=>{mode="register";step=1;err="";draw()};
      return}
    if(step===1){body().innerHTML=`
      <h1>Join the workshop.</h1><p>One account across every lab. Your work, your collaborators, and the standing you build — all in one place.</p>
      <label class="mono lbl">DISPLAY NAME</label><input class="in" id="dn" value="${esc(f.displayName)}" maxlength="28">
      <label class="mono lbl">USERNAME</label><input class="in" id="un" value="${esc(f.username)}" maxlength="20" placeholder="lowercase, unique">
      <label class="mono lbl">EMAIL</label><input class="in" id="em" value="${esc(f.email)}" type="email">
      <label class="mono lbl">PASSWORD</label><input class="in" id="pw" type="password" placeholder="6+ characters">
      ${err?`<div class="err">${esc(err)}</div>`:""}
      <button class="btn wide" id="next">Continue</button>
      <p style="margin-top:14px;font-size:12px" class="dim">Already in? <span class="switch" id="sw">Log in</span></p>`;
      $("#next").onclick=()=>{f.displayName=$("#dn").value;f.username=$("#un").value.toLowerCase();f.email=$("#em").value;f.password=$("#pw").value;
        if(!f.displayName.trim()){err="Add a display name.";return draw()}
        if(!/^[a-z0-9._]{2,20}$/.test(f.username)){err="Username: 2–20 chars, lowercase, numbers, . or _";return draw()}
        if(!/^\S+@\S+\.\S+$/.test(f.email)){err="Enter a valid email.";return draw()}
        if((f.password||"").length<6){err="Password: 6+ characters.";return draw()}
        err="";step=2;draw()};
      $("#sw").onclick=()=>{mode="login";err="";draw()};
      return}
    body().innerHTML=`
      <h1>What do you make?</h1><p>Pick everything that fits — most people here do more than one thing. This is how collaborators find you.</p>
      <div class="roles">${ROLES.map(r=>`<button class="chip ${f.roles.includes(r)?"on":""}" data-r="${esc(r)}">${esc(r)}</button>`).join("")}</div>
      ${f.roles.length?`<div class="mono dim" style="margin-top:10px">${f.roles.length} SELECTED</div>`:""}
      ${err?`<div class="err">${esc(err)}</div>`:""}
      <button class="btn wide" id="fin">Enter the Lab ↗</button>
      <button class="link" id="bk">← Back</button>`;
    document.querySelectorAll("[data-r]").forEach(b=>b.onclick=()=>{
      const r=b.dataset.r;
      if(f.roles.includes(r))f.roles=f.roles.filter(x=>x!==r);
      else if(f.roles.length<5)f.roles=[...f.roles,r];
      else{err="Up to 5 roles.";}
      err=f.roles.length?"":err;draw()});
    $("#bk").onclick=()=>{step=1;draw()};
    $("#fin").onclick=async()=>{if(!f.roles.length){err="Pick at least one.";return draw()}
      try{const d=await api.register({...f,roles:f.roles});TOKEN=d.token;localStorage.setItem("tnl-token",TOKEN);ME=d.user;
        if(d.verifyUrl)VERIFYURL=d.verifyUrl;
        GATE=null;GATEWHY="";
        startStream();refreshBadges();render();
        toast(d.mailSent?"Check your email to confirm":"You're in");
      }catch(e){err=e.message;draw()}};
  }
  draw();
}

    <h1 class="sr-h">${guest()?esc(SITE.headline||"Cultivators."):"The work."}</h1>
    <p class="sr-p">${guest()
      ?(SITE.tagline?esc(SITE.tagline).replace(/they multiply\.?$/i,"<b>they multiply.</b>"):`Artists, designers, musicians, entrepreneurs. Creatives don't just meet here — <b>they multiply.</b>`)
      :"Built and backed by the network — collaborations rise."}</p>
    <div class="sr-cta">
      ${guest()
        ?`${SITE.signupsOpen===false?`<div class="closed mono">INVITE-ONLY RIGHT NOW</div>`:`<button class="btn green" id="joinBtn2">Join the workshop</button>`}

  <div class="sr-builders" id="sr-builders"></div>

  <div class="sr-feedhead mono"><span>LATEST WORK</span><span class="dim">COLLABS RANK HIGHEST</span></div>

function srCardHTML(p){
  const accepted=p.collaborators.filter(c=>c.status==="accepted");
  return `<div class="sr-card">
    ${p.imageUrl?`<img class="sr-img" src="${esc(p.thumbUrl||p.imageUrl)}" alt="work by ${esc(p.author.displayName)}" loading="lazy" decoding="async"
      ${p.mediaW?`width="${p.mediaW}" height="${p.mediaH}" style="aspect-ratio:${p.mediaW}/${p.mediaH}"`:""}
      data-u="${esc(p.author.username)}">`
      :p.videoUrl?`<div class="vwrap">
        <video class="sr-img" src="${esc(p.videoUrl)}" muted loop playsinline preload="metadata" data-auto></video>
        <button class="vmute" data-vmute aria-label="Sound">🔇</button>
      </div>`
      :`<div class="sr-beat"><button class="circle" style="width:34px;height:34px;font-size:12px" data-beatplay='${esc(JSON.stringify(p.beat))}'>▶</button>
         <div><div class="sr-beatname">${esc(p.beat?.name||"untitled loop")}</div><div class="mono dim">${p.beat?.bpm||120} BPM${p.beat?.remixOf?` · from @${esc(p.beat.remixOf.username||"?")}`:" · LOOP"}</div></div><button class="act" data-remix="${p.id}" style="margin-left:auto">↻ Remix</button></div>`}
    <div class="sr-meta">
      <div class="sr-who" data-u="${esc(p.author.username)}">
        ${avHTML(p.author,"sm")}
        <div><div class="sr-name">${esc(p.author.displayName)}<span class="lvl">L${p.author.level}</span></div>
        <div class="mono dim">${esc(p.author.role.toUpperCase())} · #${esc(p.channel)}</div></div>
      </div>
      ${accepted.length?`<div class="sr-collab mono">↔ BUILT WITH ${accepted.map(c=>esc((c.display_name||c.username).toUpperCase())).join(" + ")}</div>`:""}
      ${p.body?`<div class="sr-body">${rich(p.body)}</div>`:""}
      <div class="sr-acts">
        <button class="igact ${p.likedByMe?"on":""}" data-like="${p.id}" aria-label="Like">${IG_HEART}<span class="igact-n">${p.likeCount||""}</span></button>
        <button class="igact" data-comments="${p.id}" aria-label="Comment">${IG_COMMENT}</button>
        <button class="igact" data-share="${p.id}" aria-label="Send">${IG_SEND}<span class="igact-n">${p.shareCount||""}</span></button>
        ${p.author.username===myName()?`<button class="act" data-collab="${p.id}">+ collab</button>`:""}
        ${p.collaborators.find(c=>c.username===myName()&&c.status==="pending")?`<button class="act on" data-accept="${p.id}">accept ✓</button>`:""}

async function loadShowroom(force){
  if(!force && SRAT && Date.now()-SRAT<8000 && SRPOSTS.length) return; // grid paints from cache

  try{
    const [d,b]=await Promise.all([api.showroom(),api.builders()]);
    SRPOSTS=d.posts||[];

/* The building. Each tile is a room you can see into: the last piece made
   there, who's been in this week, what's unread. That's what makes it a
   place rather than a nav menu. */
function labsGridHTML(){
  const A=LABACT||{byChannel:{},art:{},people:{},unread:{}};
  const labStats=(l)=>{
    let today=0,week=0,unread=0,last=0,art=null,people=[];
    for(const c of l.channels){
      const b=A.byChannel[c.id];
      if(b){today+=b.today||0;week+=b.week||0;if(b.last_at>last)last=b.last_at}
      unread+=A.unread[c.id]||0;
      const a=A.art[c.id];
      if(a&&(!art||a.at>art.at))art=a;
      for(const p of (A.people[c.id]||[])) if(!people.find(x=>x.username===p.username))people.push(p);
    }
    return {today,week,unread,last,art,people};
  };
  return `<div class="scroll">
    <div class="page-head">
      <div class="mono dim">THE LABS</div>
      <h2 class="page-h">Seven rooms.</h2>
      <p class="page-sub">Enter through what you make — meet everyone else.</p>
    </div>
    <div class="labgrid">${LABS.map(l=>{
      const id=LAB_ID[l.id]||{glyph:"◆",for:""};
      const st=labStats(l);
      const live=st.today>0;
      return `<button class="labtile ${st.unread?"hasnew":""} ${live?"live":""}" data-lab="${l.id}">
        ${st.art?`<img class="labart" src="${esc(st.art.url)}" alt="" loading="lazy">`:""}
        <div class="labshade"></div>
        <div class="labtop">
          <span class="labglyph">${id.glyph}</span>
          ${st.unread?`<span class="labnew mono">${st.unread>9?"9+":st.unread} NEW</span>`
            :live?`<span class="labdot" title="active today"></span>`:""}
        </div>
        <div class="labbody">
          <div class="labname">${esc(l.name)}</div>
          <div class="labfor">${esc(id.for)}</div>
          <div class="labrooms mono">${l.channels.map(c=>"#"+c.label).join("  ")}</div>
        </div>
        <div class="labfoot">
          ${st.people.length?`<div class="labppl">${st.people.slice(0,4).map(p=>
            p.avatarUrl?`<img src="${esc(p.avatarUrl)}" alt="">`
              :`<span>${esc(p.displayName.slice(0,1).toUpperCase())}</span>`).join("")}
            ${st.people.length>4?`<em>+${st.people.length-4}</em>`:""}</div>`:""}
          <span class="mono labmeta">${st.week
            ? st.week+" this week"
            : st.last ? "quiet · last "+timeAgo(st.last)
            : "empty — be first"}</span>
        </div>
      </button>`}).join("")}</div>
    <div class="mono dim labhint">TAP A LAB TO GO IN</div>
  </div>`;
}

function nextRate(){
  if(!ME)return null;
  const lad=MKTMETA.feeLadder||[];
  const lvl=levelFor(ME.rep).id;
  const nxt=lad.find(x=>x.level===lvl+1);
  if(!nxt)return null;
  return {need:nxt.at-ME.rep,fee:nxt.fee,name:nxt.name};
}
function rateHTML(){
  if(!ME)return "";
  const fee=MKTMETA.feePct??10;
  const n=nextRate();
  return `<div class="ratebar">
    <div class="ratenow"><b>${fee}%</b><span class="mono dim">YOUR RATE</span></div>
    <div class="rateinfo">
      <div class="mono dim">DEPOP TAKES 10% FOREVER. HERE IT DROPS AS PEOPLE VOUCH FOR YOU.</div>
      ${n?`<div class="ratenext">${n.need} more rep → <b>${n.fee}%</b> at ${esc(n.name)}</div>`
        :`<div class="ratenext">You're at the best rate in the network.</div>`}
    </div>
    <button class="ratelad mono" id="rateladder">SEE ALL →</button>
  </div>`}

function climbHTML(){
  const rep=ME?ME.rep:0, me=levelFor(rep), nx=LEVELS.find(x=>x.at>rep);
  const lad=(MKTMETA.feeLadder&&MKTMETA.feeLadder.length)?MKTMETA.feeLadder
    :LEVELS.map(l=>({level:l.id,name:l.name,at:l.at,fee:{1:10,2:8,3:6,4:4,5:2}[l.id]}));
  const fee=x=>lad.find(r=>r.level===x)?.fee??10;
  const pct=nx?Math.min(100,Math.round((rep-me.at)/(nx.at-me.at)*100)):100;
  const perks={
    1:["Post work and get seen","Back others — every like you give is someone's rep","Sell at "+fee(1)+"% — keep $"+(100-fee(1))+" of every $100"],
    2:["#finished-songs opens — done tracks only","You read as real, not a throwaway account","Fee drops to "+fee(2)+"% — keep $"+(100-fee(2))],
    3:["The network reads you as proven — collabs come to you","Fee drops to "+fee(3)+"% — keep $"+(100-fee(3))],
    4:["Core of the network — your word carries","Fee drops to "+fee(4)+"% — keep $"+(100-fee(4))],
    5:["Best rate in the network — "+fee(5)+"%, keep $"+(100-fee(5)),"You shape where this goes"]};
  return `<div class="climb" id="climbbg">
    <div class="climbw">
      <button class="climb-x" id="climbx">✕</button>
      <div class="mono dim" style="letter-spacing:.3em">THE CLIMB</div>
      <h1 class="climb-h">STANDING<br>PAYS.</h1>
      <p class="climb-sub">Rep is earned when <b style="color:var(--tx)">other people back your work</b> — and every rung you climb, you keep more of every sale and more rooms open. It never resets, and no one can buy it.</p>
      <div class="cmoney">
        <div class="mono dim">ON EVERY $100 YOU SELL, YOU KEEP</div>
        <div class="cbars">${LEVELS.map(l=>`<div class="cbar ${me.id>=l.id?"on":""}">
          <b>$${100-fee(l.id)}</b><i style="height:${(100-fee(l.id))*0.9}px"></i><b>L${l.id}</b></div>`).join("")}</div>
        <div style="margin-top:12px;font-size:13px">You keep <b style="color:var(--green)">$${100-fee(me.id)}</b> today${nx?` — reach <b>${esc(nx.name)}</b> and keep <b>$${100-fee(nx.id)}</b>`:` — the best rate there is`}.</div>
      </div>
      <div class="cprog">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span><span class="pbadge">L${me.id}</span> <b style="margin-left:6px">${esc(me.name)}</b></span>
          <span class="mono dim">${rep} REP${nx?` · ${nx.at-rep} TO ${esc(nx.name.toUpperCase())}`:" · TOP"}</span>
        </div>
        <div class="ptrack" style="margin-top:8px"><div class="pfill" style="width:${pct}%"></div></div>
      </div>
      ${LEVELS.map(l=>`<div class="crung ${me.id>=l.id?"done":""} ${me.id===l.id?"here":""}">
        <button class="crung-t" data-crung="${l.id}">
          <span class="crung-n">${me.id>=l.id?"✓":l.id}</span>
          <span style="flex:1"><b>${esc(l.name)}</b>${me.id===l.id?` <span class="mono" style="color:var(--green);font-size:9px;letter-spacing:.2em">YOU'RE HERE</span>`:""}<br><span class="mono dim" style="font-size:10px">${l.at} REP · KEEP ${100-fee(l.id)}%</span></span>
          <span class="dim">${CLIMBOPENRUNG===l.id?"–":"+"}</span>
        </button>
        ${CLIMBOPENRUNG===l.id?`<div class="crung-b">${perks[l.id].map(p=>`→ ${esc(p)}`).join("<br>")}</div>`:""}
      </div>`).join("")}
      <div class="crule">
        <div class="mono" style="color:var(--green);letter-spacing:.2em;font-size:10px">THE ONE RULE</div>
        <p style="margin-top:8px;font-size:14px;line-height:1.6">Rep only moves when <b>someone else acts</b> — likes ·6·, shares ·3·, accepted collabs ·20·, completed sales ·15·, delivered orders ·10·. Nothing you can do alone moves it. That's why it means something.</p>
      </div>
    </div>
    <div class="climb-cta"><button class="btn green" id="climbgo">Post your work — start climbing</button></div>
  </div>`}

  if(guest())return "";
  if(!MKTMETA.paymentsEnabled)return `<div class="paybar off">

function studioHTML(){
  const d=SITE.distro;
  /* The distribution offer. It sits here, above the tools, because that's
     where a producer is when they're deciding whether this place is worth
     their time. It shows YOUR standing — a generic banner is an advert; a
     number you're 186 rep away from is a reason. */
  const distro=()=>{
    if(!d)return "";
    if(guest())return `<div class="distro">
      <div class="distro-h"><span class="distro-ic">↗</span>
        <b>Reach ${esc(d.levelName)} and we put your music on Spotify.</b></div>
      <p>${esc(d.blurb)} You get there by making things people back — not by paying, not by knowing anyone.</p>
    </div>`;
    const me=levelFor(myRep());
    const done=me.id>=d.level;
    const away=Math.max(0,d.at-myRep());
    return `<div class="distro ${done?"earned":""}">
      <div class="distro-h"><span class="distro-ic">${done?"✓":"↗"}</span>
        <b>${done
          ? "You're "+esc(d.levelName)+". Your music gets distributed."
          : "At "+esc(d.levelName)+", TNL puts your music on Spotify, Apple Music and the rest."}</b></div>
      <p>${esc(d.blurb)}</p>
      ${done
        ? `<div class="mono distro-go">↗ MESSAGE @TNLLABS WITH A FINISHED TRACK AND IT GOES OUT</div>`
        : `<div class="distro-bar"><div class="distro-fill" style="width:${Math.min(100,(myRep()/d.at)*100)}%"></div></div>
           <div class="mono dim distro-meta">${myRep()} / ${d.at} REP · ${away} TO GO — EARNED WHEN OTHERS BACK YOUR WORK, NEVER BY POSTING MORE</div>`}
    </div>`;
  };
  return `<div class="scroll">
  <div class="page-head"><div class="mono dim">MUSIC LAB · TOOLS</div><h2>Studio</h2>
  <p class="page-sub">${guest()
    ?"A full beat maker in the app — drums, a tuned 808, synths with a scale-locked piano roll. Have a play. Joining lets you save it, export a WAV, or publish it to #beats for someone to write to."
    :"Make it here — publish straight to #beats."}</p>
  ${guest()?`<div class="tryline mono">TRY IT — NOTHING SAVES UNTIL YOU JOIN</div>`:""}
  ${distro()}</div>
  <div id="studiomount"></div>
</div>`}

/* Renders one piece of work on a profile. Takes the account's KIND so the
   collab credit reads in their language — "Designed with" vs "Made with". */
function workCardHTML(p, collab, K) {
  K = K || KINDS.visual;
  const accepted = p.collaborators.filter(c => c.status === "accepted");
  const kind = p.beat ? "BEAT" : p.videoUrl ? "VIDEO" : p.imageUrl ? "IMAGE" : "POST";
  return `<div class="work" data-openpost="${p.id}">
    <div class="work-top"><span class="mono work-kind">${kind} · #${esc(p.channel)}</span>
      ${collab ? `<span class="mono work-collab">↔ ${esc(K.collabLine.toUpperCase())} ${esc(p.author.displayName.toUpperCase())}</span>` : ""}</div>
    ${p.beat ? `<div class="work-beat"><button class="circle" style="width:28px;height:28px;font-size:10px" data-beatplay='${esc(JSON.stringify(p.beat))}'>▶</button><span class="nm">${esc(p.beat.name || "untitled loop")}</span><span class="mono dim">${p.beat.bpm}BPM</span></div>`
      : (p.images && p.images.length > 1) ? `<div class="caro" data-caro="w${p.id}">
          <div class="caro-t">${p.images.map(im => `<img class="caro-i" src="${esc(im.thumb || im.url)}" alt="" loading="lazy">`).join("")}</div>
          <div class="caro-d">${p.images.map((_, i) => `<span class="${i === 0 ? "on" : ""}"></span>`).join("")}</div>
          <span class="caro-n mono">1/${p.images.length}</span>
        </div>${p.body ? `<div class="work-body" style="margin-top:6px">${esc(p.body)}</div>` : ""}`
      : p.imageUrl ? `<img class="work-img" src="${esc(p.thumbUrl || p.imageUrl)}" alt="work" loading="lazy" decoding="async">${p.body ? `<div class="work-body" style="margin-top:6px">${esc(p.body)}</div>` : ""}`
      : p.videoUrl ? `<video class="work-img" src="${esc(p.videoUrl)}" controls playsinline preload="metadata"></video>`
      : `<div class="work-body">${esc(p.body || "—")}</div>`}
    <div class="work-foot mono"><span>♥ ${p.likeCount}</span><span>↻ ${p.shareCount}</span>
      ${accepted.length ? `<span class="work-cnames">✓ ${accepted.map(c => esc(c.display_name || c.username)).join(", ")}</span>` : ""}
      <span class="dim" style="margin-left:auto">${new Date(p.createdAt).toLocaleDateString()}</span>
      <button class="work-share" data-share="${p.id}" title="Share">↗</button></div>
  </div>`;
}

  ["#joinBtn","#joinBtn2","#joinBtn3"].forEach(id=>{const b=$(id);if(b)b.onclick=()=>{GATE="join";GATEWHY="";render()}});

  const bb=$("#backb");if(bb)bb.onclick=()=>{ROOMOPEN=false;render()};
  const sendb=$("#sendb");if(sendb){const go=async()=>{

      return;
    }
    if(!t&&!QUEUE.length)return;

    /* Discord sends one message with N attachments. We send N posts — in a
       portfolio each piece needs its own likes and its own collab credits,
       and you can't credit a collaborator on "attachment 3 of 5".
       The text rides on the first one. */
    const queue=QUEUE.slice(), work=ASWORK, draftText=t;
    $("#draft").value="";
    QUEUE=[];ASWORK=false;

    if(!queue.length){
      // plain text — the fast path, unchanged
      const temp={id:"tmp"+Date.now(),channel:CH.id,body:draftText,beat:null,
        imageUrl:null,thumbUrl:null,mediaW:null,mediaH:null,videoUrl:null,isWork:false,
        editedAt:null,sharedFrom:null,createdAt:Date.now(),
        author:{username:ME.username,displayName:ME.displayName,role:ME.role,avatarUrl:ME.avatarUrl,rep:ME.rep,level:levelFor(ME.rep).id},
        likeCount:0,shareCount:0,commentCount:0,likedByMe:false,collaborators:[],pending:true};
      POSTS=[...POSTS,temp];renderRoomFeed();

      }catch(e){
        const p=POSTS.find(x=>x.id===temp.id);

    const vids=queue.filter(q=>q.kind==="video");
    const imgs=queue.filter(q=>q.kind==="image"&&q.prep);

    if(imgs.length){
      const temp={id:"tmp"+Date.now(),channel:CH.id,body:draftText,beat:null,
        imageUrl:imgs[0].prep.full,thumbUrl:imgs[0].prep.thumb,
        mediaW:imgs[0].prep.w,mediaH:imgs[0].prep.h,
        images:imgs.length>1?imgs.map(q=>({url:q.prep.full,thumb:q.prep.thumb,w:q.prep.w,h:q.prep.h})):null,
        videoUrl:null,isWork:work,editedAt:null,sharedFrom:null,createdAt:Date.now(),
        author:{username:ME.username,displayName:ME.displayName,role:ME.role,avatarUrl:ME.avatarUrl,rep:ME.rep,level:levelFor(ME.rep).id},
        likeCount:0,shareCount:0,commentCount:0,likedByMe:false,collaborators:[],pending:true};

          UPPROG=i/imgs.length;renderRoomFeed();

          mediaW:uploaded[0].w,mediaH:uploaded[0].h,
          images:uploaded.length>1?uploaded:undefined});
        POSTS=POSTS.filter(p=>p.id!==temp.id);

        const p=POSTS.find(x=>x.id===temp.id);
        if(p){p.pending=false;p.failed=true;p.retry={body:draftText,imgs,work};renderRoomFeed()}
        UPPROG=null;toast(e.message);
      }
    }

    // videos get their own post each — a 600MB file isn't a thumbnail in a grid
    for(const q of vids){
      const temp={id:"tmp"+Date.now()+"_v",channel:CH.id,body:imgs.length?"":draftText,beat:null,
        imageUrl:null,thumbUrl:null,mediaW:null,mediaH:null,images:null,

    const dr=$("#draft");

  /* Discord's flow: pick several, see them all, drop any, send once.

     likes and its own collab credits, which a grouped attachment can't have. */
  const fi=$("#filein");if(fi)fi.onchange=async()=>{
    const files=[...(fi.files||[])];fi.value="";
    for(const f of files){
      if(QUEUE.length>=10){toast("10 at a time");break}
      if(f.type.startsWith("video/")){
        if(f.size>650*1024*1024){toast(f.name+" is over 650MB");continue}
        QUEUE.push({file:f,kind:"video",name:f.name,state:"ok",preview:null});
        continue;
      }
      if(f.size>30*1024*1024){toast(f.name+" is over 30MB");continue}
      QUEUE.push({file:f,kind:"image",name:f.name,state:"prep",preview:null});
    }
    render();
    // prep previews after painting, so the grid appears instantly
    for(const q of QUEUE){
      if(q.kind!=="image"||q.prep)continue;
      try{q.prep=await prepImage(q.file,ASWORK);q.preview=q.prep.thumb;q.state="ok"}

  };

  const lb=$("#lb");if(lb)lb.onclick=()=>{LIGHTBOX=null;render()};
