<script>
  // Setup standard DOM nodes, load sound files, and execute interface actions!
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const sequencer = new TNLSequencerEngine(audioContext);
  const exporter = new TNLExportEngine(sequencer);

  // Load sample asset helper
  async function loadSample(url) {
    const response = await fetch(url);
    const arrayBuffer = await response.arrayBuffer();
    return audioContext.decodeAudioData(arrayBuffer);
  }

  async function bootstrapSequencer() {
    // 1. Dynamically download your instrument files
    const kickBuffer = await loadSample('/samples/kick.wav');
    const snareBuffer = await loadSample('/samples/snare.wav');
    const openHat = await loadSample('/samples/open_hat.wav');
    const closedHat = await loadSample('/samples/closed_hat.wav');

    // 2. Initialize sequencer instrument channels with choke-group rule assignments
    sequencer.addChannel('Kick', kickBuffer);
    sequencer.addChannel('Snare', snareBuffer);
    sequencer.addChannel('OpenHat', openHat, { chokeGroup: 'hats' });
    sequencer.addChannel('ClosedHat', closedHat, { chokeGroup: 'hats' });
  }

  // Bind your buttons & sliders to the sequencer variables (sequencer.tempo, sequencer.swing, exporter.downloadAllStems())
  bootstrapSequencer();
</script>
