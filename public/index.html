<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TNLLABS 🧪</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TNLLABS">
<link rel="apple-touch-icon" href="/icon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#000;--card:#0A0A0A;--el:#141414;--line:rgba(255,255,255,.12);--line2:rgba(255,255,255,.28);
--tx:#fff;--dim:#8A8A8A;--green:#22C55E;}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{background:var(--bg);color:var(--tx);font-family:'Archivo',system-ui,sans-serif;overflow:hidden}
.mono{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em}
.dim{color:var(--dim)}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
h1,h2,h3{text-transform:uppercase;letter-spacing:-.01em}
.app{height:100dvh;display:flex;flex-direction:column}
/* controls */
.in{width:100%;background:var(--el);border:1px solid var(--line);border-radius:9px;color:var(--tx);padding:11px 13px;font-size:14px}
.in:focus{outline:none;border-color:var(--line2)}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--tx);color:#000;border:none;border-radius:9px;padding:10px 15px;font-weight:700;font-size:13px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.wide{width:100%;justify-content:center;padding:13px;margin-top:16px}
.btn.ghost{background:transparent;color:var(--tx);border:1px solid var(--line2)}
.btn.green{background:var(--green)}
.link{background:none;border:none;color:var(--dim);font-size:12px;margin-top:12px}
.err{color:#F87171;font-size:12px;margin-top:10px;font-family:'IBM Plex Mono',monospace}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--el);border:1px solid var(--line);color:var(--tx);border-radius:999px;padding:8px 13px;font-size:12px}
.chip.on{background:var(--tx);color:#000;border-color:var(--tx)}
/* auth */
.gate{height:100dvh;display:flex;align-items:center;justify-content:center;padding:22px}
.gatecard{width:100%;max-width:400px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 24px}
.brand{font-weight:900;font-size:14px;letter-spacing:.03em}
.brand .fl{font-size:.9em}
.gate h1{font-size:28px;font-weight:900;margin:18px 0 8px}
.gate p{font-size:13px;line-height:1.6;color:var(--dim);margin-bottom:14px}
.lbl{display:block;margin:13px 0 6px;color:var(--dim)}
.roles{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.switch{text-decoration:underline;cursor:pointer;color:var(--tx)}
/* top bar */
.top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line)}
.top-user{display:flex;align-items:center;gap:7px;background:var(--el);border:1px solid var(--line);color:var(--tx);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700}
.udot{width:7px;height:7px;border-radius:50%;background:var(--green)}
/* nav */
.nav{display:flex;border-top:1px solid var(--line);background:var(--card)}
.navb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--dim);padding:10px 0 12px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em}
.navb.on{color:var(--tx)}
.navb.on .ic{color:var(--green)}
.ic{font-size:17px;line-height:1;font-style:normal}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
/* landing */
.hero{padding:56px 22px 28px;border-bottom:1px solid var(--line)}
.hero .eyebrow{color:var(--green);letter-spacing:.16em;margin-bottom:16px}
.hero h1{font-size:clamp(38px,10vw,72px);font-weight:900;line-height:.93;margin-bottom:18px}
.hero p{font-size:14px;line-height:1.65;color:#C4C4C4;max-width:500px;margin-bottom:22px}
.ctas{display:flex;gap:10px;flex-wrap:wrap}
.sec{padding:26px 22px;border-bottom:1px solid var(--line)}
.sec-h{color:var(--dim);letter-spacing:.14em;margin-bottom:14px;display:flex;justify-content:space-between;align-items:baseline}
.sec-h button{background:none;border:none;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em}
.sec-h button:hover{color:var(--green)}
.labgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px}
.labcard{text-align:left;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px;color:var(--tx)}
.labcard:hover{border-color:var(--line2)}
.labcard .k{color:var(--green);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em}
.labcard .n{font-weight:900;font-size:15px;margin-top:18px}
.labcard .l{font-size:12px;color:var(--dim);line-height:1.5;margin-top:4px}
.foot{padding:32px 22px 40px}
.foot .big{font-weight:900;font-size:clamp(15px,4vw,20px);text-transform:uppercase;margin-bottom:6px}
/* labs view */
.labs-wrap{flex:1;display:flex;overflow:hidden}
.rail{width:190px;flex-shrink:0;border-right:1px solid var(--line);overflow-y:auto;padding:12px 8px;background:var(--card)}
.railh{color:var(--dim);padding:4px 8px;margin-top:8px}
.railc{display:flex;align-items:center;gap:7px;width:100%;background:none;border:none;color:var(--dim);padding:7px 8px;border-radius:7px;font-size:13px;text-align:left;font-family:'Archivo'}
.railc:hover,.railc.on{background:var(--el);color:var(--tx)}
.room{flex:1;display:flex;flex-direction:column;min-width:0}
.roomh{display:flex;align-items:center;gap:8px;padding:11px 15px;border-bottom:1px solid var(--line);font-weight:700;font-size:14px}
.roomh .desc{font-weight:400;font-size:11px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* feed */
.feed{flex:1;overflow-y:auto;padding:14px 15px;display:flex;flex-direction:column;gap:10px}
.post{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 13px}
.post-h{display:flex;align-items:center;gap:9px}
.av{width:32px;height:32px;border-radius:50%;background:var(--el);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:10px;flex-shrink:0;cursor:pointer}
.post-by{font-weight:700;font-size:13px;cursor:pointer}
.post-by:hover{color:var(--green)}
.lvl{background:var(--green);color:#000;font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 5px;border-radius:4px;margin-left:5px}
.post-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.06em}
.post-body{font-size:14px;line-height:1.55;color:#E5E2DA;margin:8px 0 2px;word-break:break-word}
.shared-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--green);letter-spacing:.08em;margin-bottom:5px}
.post-acts{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
.act{display:inline-flex;align-items:center;gap:5px;background:var(--el);border:1px solid var(--line);color:var(--dim);border-radius:999px;padding:3px 11px;font-size:11px;font-family:'IBM Plex Mono',monospace}
.act:hover{border-color:var(--green);color:var(--green)}
.act.on{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.12)}
.collab-row{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.ctag{font-family:'IBM Plex Mono',monospace;font-size:9px;border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--dim)}
.ctag.acc{border-color:var(--green);color:var(--green)}
.composer{display:flex;gap:8px;padding:11px 15px 13px;border-top:1px solid var(--line)}
.composer .in{flex:1}
.send{width:44px;background:var(--tx);color:#000;border:none;border-radius:9px;font-weight:900}
.send:disabled{opacity:.3}
/* beat lab */
.beat{border:1px solid var(--line);border-radius:14px;margin:14px 15px;padding:16px;background:var(--card)}
.beat-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.beat-h{font-weight:900;font-size:15px;text-transform:uppercase;margin-top:2px}
.beat-ctl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.circle{width:38px;height:38px;border-radius:50%;border:none;background:var(--tx);color:#000;font-size:14px}
.circle.on{background:var(--green)}
.beat-ctl input[type=range]{accent-color:var(--green);width:88px}
.sq{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--el);color:var(--dim)}
.grid{display:flex;flex-direction:column;gap:6px}
.grow{display:flex;align-items:center;gap:9px}
.tname{width:40px;flex-shrink:0;color:var(--dim)}
.cells{display:grid;grid-template-columns:repeat(16,1fr);gap:3px;flex:1}
.cell{aspect-ratio:1/1;border-radius:4px;border:1px solid var(--line);background:var(--el);padding:0}
.cell.bar{border-color:var(--line2)}
.cell.on{background:var(--tx);border-color:var(--tx)}
.cell.now{outline:2px solid var(--green);outline-offset:-1px}
.beat-pub{display:flex;gap:8px;margin-top:14px}
.beat-pub .in{flex:1}
.beatmsg{display:flex;align-items:center;gap:10px;background:var(--el);border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-top:8px}
.beatmsg .nm{font-weight:700;font-size:12px}
/* market */
.shop{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:0 22px 28px}
.prod{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;text-decoration:none;color:var(--tx);display:block}
.prod:hover{border-color:var(--line2)}
.prod-img{aspect-ratio:1/1;background:var(--el);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:var(--dim)}
.prod-n{font-size:12.5px;font-weight:700;padding:9px 11px 2px}
.prod-p{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:0 11px 11px;display:block}
.was{text-decoration:line-through;color:var(--dim);margin-right:6px}
.page-head{padding:24px 22px 12px}
.page-head h2{font-size:26px;font-weight:900;margin:4px 0}
.page-head p{color:var(--dim);font-size:13px;line-height:1.6}
/* profile sheet */
.sheet{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;justify-content:flex-end;z-index:60}
.sheetc{width:100%;max-width:390px;height:100%;background:var(--card);border-left:1px solid var(--line);overflow-y:auto;padding:22px 20px 50px}
.sheeth{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.sheeth h2{font-size:19px;font-weight:900}
.x{background:none;border:none;color:var(--tx);opacity:.6;font-size:18px}
.pid{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pav{width:50px;height:50px;border-radius:50%;background:var(--el);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:14px}
.pname{font-weight:900;font-size:16px}
.plvl{background:var(--el);border-radius:12px;padding:13px;margin-bottom:16px}
.plr{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.pbadge{background:var(--green);color:#000;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:4px 8px;border-radius:6px}
.ptrack{height:6px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden}
.pfill{height:100%;background:var(--green);transition:width .3s}
.ladder{display:flex;flex-direction:column;gap:4px;margin:14px 0}
.lstep{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 2px;opacity:.4}
.lstep.done{opacity:1}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
.lstep.done .ldot{background:var(--green)}
.lstep span:nth-child(3){flex:1}
/* portfolio */
.pbio{font-size:13.5px;line-height:1.6;color:#D6D2C8;margin:2px 0 8px;white-space:pre-wrap}
.plink{display:inline-block;color:var(--green);text-decoration:none;margin-bottom:12px;letter-spacing:.06em}
.pstats{display:flex;gap:6px;margin:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px 0}
.pstat{flex:1;display:flex;flex-direction:column;gap:3px}
.pstat b{font-size:17px;font-weight:900}
.pactions{display:flex;gap:8px;margin-bottom:14px}
.pactions .btn{flex:1;justify-content:center}
.ptabs{display:flex;gap:6px;margin:14px 0 10px}
.ptab{flex:1;background:var(--el);border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:8px 4px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em}
.ptab.on{background:var(--tx);color:#000;border-color:var(--tx)}
.worklist{display:flex;flex-direction:column;gap:9px}
.work{background:var(--el);border:1px solid var(--line);border-radius:10px;padding:10px 11px;cursor:pointer}
.work:hover{border-color:var(--line2)}
.work-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:6px}
.work-kind{color:var(--green);letter-spacing:.08em}
.work-collab{color:var(--dim)}
.work-body{font-size:13px;line-height:1.5;color:#D6D2C8;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.work-beat{display:flex;align-items:center;gap:8px}
.work-beat .nm{font-size:12.5px;font-weight:700}
.work-foot{display:flex;gap:10px;align-items:center;margin-top:8px;color:var(--dim);font-size:9px;flex-wrap:wrap}
.work-cnames{color:var(--green)}
textarea.in{resize:vertical;line-height:1.5}
/* images */
.attach{width:38px;flex-shrink:0;background:var(--el);border:1px solid var(--line);color:var(--dim);border-radius:9px;font-size:18px;font-weight:400;line-height:1}
.attach:hover{color:var(--green);border-color:var(--green)}
.attach-bar{display:flex;align-items:center;gap:9px;padding:8px 15px;border-top:1px solid var(--line);background:var(--card)}
.uptrack{height:3px;background:var(--el);border-radius:2px;overflow:hidden;margin-top:5px}
.upbar{height:100%;background:var(--green);width:0;transition:width .2s linear}
.attach-bar img{width:42px;height:42px;object-fit:cover;border-radius:7px;border:1px solid var(--line2)}
.attach-x{margin-left:auto;background:none;border:none;color:var(--dim);font-size:14px}
.attach-x:hover{color:#F87171}
.post-img{width:100%;max-height:520px;object-fit:contain;border-radius:9px;margin-top:8px;border:1px solid var(--line);cursor:zoom-in;display:block;background:var(--el)}
.work-img{width:100%;max-height:180px;object-fit:cover;border-radius:7px;display:block}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:90;display:flex;align-items:center;justify-content:center;padding:16px;cursor:zoom-out}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain}
/* verification + publish */
.verifybar{display:flex;align-items:center;gap:9px;background:rgba(34,197,94,.1);border-bottom:1px solid rgba(34,197,94,.3);padding:9px 15px;font-size:12px;color:#D6D2C8;flex-wrap:wrap}
.verifybar b{color:var(--tx)}
/* guest mode */
.gatetop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.gatewhy{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:9px;padding:10px 12px;font-size:12.5px;line-height:1.55;color:#D6D2C8;margin:14px 0 -4px}
.wall{padding:44px 22px 60px;max-width:520px;margin:0 auto;text-align:center}
.wall-ic{font-size:36px;margin-bottom:14px}
.wall-h{font-size:clamp(22px,5vw,30px);font-weight:900;margin:10px 0 12px;line-height:1.05}
.wall-p{font-size:13.5px;line-height:1.7;color:var(--dim);margin-bottom:20px}
.wall-labs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:22px}
.wall-lab{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;border:1px solid var(--line2);border-radius:999px;padding:5px 11px;color:var(--dim)}
.wall-cta{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.tryline{color:var(--green);font-size:9px;letter-spacing:.12em;margin-top:8px}
.vb-btn{background:var(--green);color:#000;border:none;border-radius:7px;padding:5px 11px;font-size:11px;font-weight:700;text-decoration:none;display:inline-block}
.publink{display:block;color:var(--green);text-decoration:none;font-size:10px;letter-spacing:.06em;margin-bottom:12px;word-break:break-all}
/* showroom — the front page */
.sr-head{padding:34px 20px 22px;border-bottom:1px solid var(--line)}
.sr-eyebrow{color:var(--green);letter-spacing:.16em;margin-bottom:14px}
.sr-h{font-size:clamp(34px,9vw,58px);font-weight:900;line-height:.94;margin-bottom:12px}
.sr-p{font-size:14px;line-height:1.65;color:var(--dim);max-width:430px;margin-bottom:18px}
.sr-p b{color:var(--tx);font-weight:700}
.sr-cta{display:flex;gap:9px;flex-wrap:wrap}
.sr-feedhead{display:flex;justify-content:space-between;align-items:baseline;padding:16px 20px 10px;color:var(--dim);letter-spacing:.12em}
/* what this is — four lines, guests only */
.whatis{padding:4px 20px 20px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:11px;max-width:620px}
.wi{display:flex;gap:12px;align-items:baseline}
.wi-k{color:var(--green);letter-spacing:.12em;width:98px;flex-shrink:0;font-size:9px}
.wi-v{font-size:13px;line-height:1.55;color:var(--dim)}
@media(max-width:520px){.wi{flex-direction:column;gap:2px}.wi-k{width:auto}}
.sr-builders{padding:0 20px}
.brow{display:flex;gap:9px;overflow-x:auto;padding-bottom:8px}
.bcard{flex-shrink:0;width:112px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 10px;text-align:center;color:var(--tx)}
.bcard:hover{border-color:var(--green)}
.bcard .av{margin:0 auto 8px}
.bname{font-size:12px;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bstat{color:var(--green);margin-top:5px;font-size:9px}
.sr-grid{columns:2;column-gap:11px;padding:0 20px 30px}
@media(max-width:600px){.sr-grid{columns:1}}
@media(min-width:1000px){.sr-grid{columns:3}}
.sr-card{break-inside:avoid;margin-bottom:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.sr-card:hover{border-color:var(--line2)}
.sr-img{width:100%;display:block;cursor:zoom-in}
.sr-beat{display:flex;align-items:center;gap:10px;padding:20px 14px;background:var(--el)}
.sr-beatname{font-weight:900;font-size:13px}
.sr-meta{padding:11px}
.sr-who{display:flex;align-items:center;gap:8px;cursor:pointer}
.sr-name{font-size:12.5px;font-weight:900}
.sr-collab{color:var(--green);font-size:9px;letter-spacing:.06em;margin-top:8px}
.sr-body{font-size:12.5px;line-height:1.5;color:#C9C5BB;margin-top:7px}
.sr-acts{display:flex;gap:7px;margin-top:9px}
/* beat maker */
.beat-name{background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--tx);font-family:'Archivo';font-weight:900;font-size:17px;text-transform:uppercase;padding:3px 0;margin-top:3px;width:180px}
.beat-name:focus{outline:none;border-color:var(--green)}
.knob{display:flex;align-items:center;gap:5px}
.knob input[type=range]{accent-color:var(--green);width:66px}
.knob.wide input[type=range]{width:100%;flex:1}
.knob b{font-size:10px;min-width:22px}
.sel{background:var(--el);border:1px solid var(--line);color:var(--tx);border-radius:7px;padding:5px 7px;font-family:'IBM Plex Mono',monospace;font-size:10px}
.barbar{display:flex;align-items:center;gap:8px;margin:12px 0;flex-wrap:wrap}
.bars{display:flex;gap:4px}
.barb{width:26px;height:26px;border-radius:6px;border:1px solid var(--line);background:var(--el);color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:10px}
.barb.active{color:var(--tx)}
.barb.on{background:var(--tx);color:#000;border-color:var(--tx)}
.grow.muted{opacity:.32}
.tctl{width:62px;flex-shrink:0}
.tname{background:none;border:none;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;padding:0;text-align:left;display:block}
.tname:hover{color:var(--green)}
.tbtns{display:flex;gap:3px;margin-top:3px}

/* ---- api ---- */
async function req(path,opts={}){
  const h={"Content-Type":"application/json"};
  if(TOKEN)h.Authorization="Bearer "+TOKEN;
  const r=await fetch(API+path,{method:opts.method||"GET",headers:h,body:opts.body?JSON.stringify(opts.body):undefined});
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.error||("HTTP "+r.status));
  return d;
}

/* ---- images ----
   Phone photos are 5–12MB. Resize to max 1400px and re-encode as JPEG
   before upload so posting is fast and storage stays sane. */
/* Decode once, then emit whatever sizes we need. Returns dimensions so
   the feed can reserve space — an <img> with no width/height is what
   makes a feed jump around while it loads. */
function loadImage(file){
  return new Promise((resolve,reject)=>{
    if(!file.type.startsWith("image/"))return reject(new Error("Not an image"));
    const fr=new FileReader();
    fr.onerror=()=>reject(new Error("Couldn't read that file"));
    fr.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject(new Error("Couldn't decode that image"));
      img.onload=()=>resolve({img,dataUrl:fr.result});
      img.src=fr.result;
    };
    fr.readAsDataURL(file);
  });
}
function resize(img,maxDim,quality){
  let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
  if(w>maxDim||h>maxDim){const s=Math.min(maxDim/w,maxDim/h);w=Math.round(w*s);h=Math.round(h*s)}
  const c=document.createElement("canvas");c.width=w;c.height=h;
  c.getContext("2d").drawImage(img,0,0,w,h);
  return {data:c.toDataURL("image/jpeg",quality),w,h};
}
/* Full-size for the lightbox + a small thumb for the feed. The feed used
   to download every full-res image at once — rough on cellular. */
async function prepImage(file,asWork){
  const {img,dataUrl}=await loadImage(file);
  const W=img.naturalWidth||img.width, H=img.naturalHeight||img.height;
  if(file.type==="image/gif"&&file.size<4*1024*1024)
    return {full:dataUrl,thumb:dataUrl,w:W,h:H,gif:true};
  const full=resize(img,asWork?2400:1600,asWork?.92:.85);
  const thumb=resize(img,700,.72);
  return {full:full.data,thumb:thumb.data,w:full.w,h:full.h};
}
function compressImage(file,maxDim=1400,quality=.82){
  return loadImage(file).then(({img,dataUrl})=>{
    if(file.type==="image/gif"&&file.size<4*1024*1024)return dataUrl;
    return resize(img,maxDim,quality).data;
  });
}

/* Streams the raw file straight to the server — no base64, no giant string
   in memory, and we get real progress. XHR rather than fetch because fetch
   still can't report UPLOAD progress, and a 600MB upload with no feedback
   is indistinguishable from a hang. */
function uploadStream(fileOrBlob,onProgress){
  return new Promise((resolve,reject)=>{
    const x=new XMLHttpRequest();
    x.open("POST",API+"/api/upload/stream");
    x.setRequestHeader("Content-Type","application/octet-stream");
    if(TOKEN)x.setRequestHeader("Authorization","Bearer "+TOKEN);
    x.upload.onprogress=e=>{if(e.lengthComputable&&onProgress)onProgress(e.loaded/e.total)};
    x.onload=()=>{
      let d={};try{d=JSON.parse(x.responseText)}catch(e){}
      if(x.status>=200&&x.status<300)resolve(d);
      else reject(new Error(d.error||("upload failed ("+x.status+")")));
    };
    x.onerror=()=>reject(new Error("Upload failed — check your connection"));
    x.onabort=()=>reject(new Error("Upload cancelled"));
    UPLOADXHR=x;
    x.send(fileOrBlob);
  });
}
function dataUrlToBlob(d){
  const [meta,b64]=d.split(",");
  const mime=(/data:([^;]+)/.exec(meta)||[])[1]||"application/octet-stream";
  const bin=atob(b64); const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

function readFile(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onerror=()=>rej(new Error("Couldn't read that file"));
    fr.onload=()=>res(fr.result);
    fr.readAsDataURL(file);
  });
}

      PICKER.q=q.value;

      clearTimeout(t);

    };
  }
}

function timeAgo(t){const s=(Date.now()-t)/1000;
  if(s<60)return "JUST NOW";if(s<3600)return Math.floor(s/60)+"M AGO";
  if(s<86400)return Math.floor(s/3600)+"H AGO";if(s<604800)return Math.floor(s/86400)+"D AGO";
  return new Date(t).toLocaleDateString().toUpperCase()}

/* ---- wiring ---- */
function wire(){
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{TAB=b.dataset.tab;if(window.TNLStudio)TNLStudio.unmount();if(TAB==="market"){MKTVIEW="browse";loadMarket()}render()});
  document.querySelectorAll("[data-goto]").forEach(b=>b.onclick=()=>{TAB=b.dataset.goto;render()});
  const srp=$("#sr-post");if(srp)srp.onclick=()=>{
    // land them in the room their trade lives in
    const target=kindOf(ME).home;
    let found=false;
    for(const l of LABS){const c=l.channels.find(x=>x.id===target);if(c){LAB=l;CH=c;found=true;break}}
    if(!found){LAB=LABS.find(l=>l.id==="art")||LABS[0];CH=LAB.channels[0]}
    TAB="labs";ROOMOPEN=true;render();
    if(!CH.beatlab)setTimeout(()=>{const fi=$("#filein");if(fi)fi.click()},250);
  };
  document.querySelectorAll("[data-lab]").forEach(b=>b.onclick=()=>{const l=LABS.find(x=>x.id===b.dataset.lab);LAB=l;CH=l.channels[0];TAB="labs";ROOMOPEN=true;render()});
  const meBtn=$("#meBtn");if(meBtn)meBtn.onclick=()=>{PROFCACHE.delete(ME.username);openProfile(ME.username)};
  const nb=$("#notifBtn");if(nb)nb.onclick=async()=>{
    NOTIFOPEN=true;NOTIFS=null;render();
    try{const d=await api.notifs();NOTIFS=d.notifications;render();
      if(d.unread){await api.readNotifs();UNREAD=0;render()}}catch(e){toast(e.message)}};
  const db_=$("#dmBtn");if(db_)db_.onclick=async()=>{
    DMOPENPANEL=true;DMOPEN=null;DMS=null;render();
    try{const d=await api.dmList();DMS=d.threads;DMUNREAD=d.unreadTotal;render()}catch(e){toast(e.message)}};
  const sb_=$("#searchBtn");if(sb_)sb_.onclick=()=>{SEARCHOPEN=true;render();setTimeout(()=>$("#sq")?.focus(),100)};
  ["#joinBtn","#joinBtn2","#joinBtn3"].forEach(id=>{const b=$(id);if(b)b.onclick=()=>{GATE="join";GATEWHY="";render()}});
  ["#loginBtn","#loginBtn2","#loginBtn3"].forEach(id=>{const b=$(id);if(b)b.onclick=()=>{GATE="login";GATEWHY="";render()}});
  wirePanels();
  const rs=$("#resendb");if(rs)rs.onclick=async()=>{
    try{const d=await api.resend();
      if(d.already){await refreshMe();toast("Already verified — you're good");return render()}
      if(d.verifyUrl){VERIFYURL=d.verifyUrl;toast("Email isn't set up — tap Open link");render()}
      else toast("Sent to "+(d.email||"your inbox")+" — check spam too");
    }catch(e){toast(e.message)}};
  document.querySelectorAll("[data-ch]").forEach(b=>b.onclick=()=>{
    for(const l of LABS){const c=l.channels.find(x=>x.id===b.dataset.ch);if(c){LAB=l;CH=c}}
    ROOMOPEN=true;if(window.TNLStudio)TNLStudio.unmount();render()});
  const bb=$("#backb");if(bb)bb.onclick=()=>{ROOMOPEN=false;render()};
  const sendb=$("#sendb");if(sendb){const go=async()=>{
    const t=$("#draft").value.trim();
    if(EDITID){
      const id=EDITID;
      try{await api.editPost(id,t);EDITID=null;$("#draft").value="";loadFeed();render()}catch(e){toast(e.message)}
      return;
    }
    if(!t&&!PENDIMG&&!PENDVID)return;
    const prep=PENDPREP, vid=PENDVID, kind=PENDKIND, work=ASWORK;
    const draftText=t;
    // clear the composer immediately — waiting on the network to empty a
    // text box is what makes an app feel slow
    $("#draft").value="";
    PENDIMG=null;PENDVID=null;PENDKIND=null;PENDFILE=null;PENDPREP=null;ASWORK=false;

    // show it in the feed right away, flagged as pending
    const temp={id:"tmp"+Date.now(),channel:CH.id,body:draftText,beat:null,
      imageUrl:prep?prep.full:null,thumbUrl:prep?prep.thumb:null,mediaW:prep?prep.w:null,mediaH:prep?prep.h:null,
      videoUrl:null,isWork:work,editedAt:null,sharedFrom:null,createdAt:Date.now(),
      author:{username:ME.username,displayName:ME.displayName,role:ME.role,avatarUrl:ME.avatarUrl,rep:ME.rep,level:levelFor(ME.rep).id},
      likeCount:0,shareCount:0,commentCount:0,likedByMe:false,collaborators:[],pending:true};
    POSTS=[...POSTS,temp];
    renderRoomFeed();
    const feed=$("#feed");if(feed)feed.scrollTop=feed.scrollHeight;

    try{
      const body={channel:CH.id,body:draftText,isWork:work};
      const bump=(f)=>{UPPROG=f;const el=$("#upbar");if(el)el.style.width=Math.round(f*100)+"%"};
      if(prep){
        UPPROG=0;renderRoomFeed();
        const up=await uploadStream(dataUrlToBlob(prep.full),bump);
        body.imageUrl=up.url;
        const th=await uploadStream(dataUrlToBlob(prep.thumb));
        body.thumbUrl=th.url;
        body.mediaW=prep.w;body.mediaH=prep.h;
        UPPROG=null;
      } else if(vid){
        UPPROG=0;renderRoomFeed();
        const up=await uploadStream(vid,bump);   // vid is the raw File — streamed
        if(up.kind==="video")body.videoUrl=up.url;else body.imageUrl=up.url;
        UPPROG=null;
      }
      await api.post(body);
      POSTS=POSTS.filter(p=>p.id!==temp.id);
      loadFeed();
    }catch(e){
      // mark the pending post as failed rather than silently dropping it
      const p=POSTS.find(x=>x.id===temp.id);
      if(p){p.pending=false;p.failed=true;p.retry={body:draftText,prep,vid,kind,work};renderRoomFeed()}
      toast(e.message);
    }};
    sendb.onclick=go;
    const dr=$("#draft");
    dr.onkeydown=e=>{if(e.key==="Enter"&&!MENTIONS)go()};
    let mt=null;
    dr.oninput=async()=>{
      const upto=dr.value.slice(0,dr.selectionStart||dr.value.length);
      const m=/@([a-z0-9._]*)$/i.exec(upto);
      if(!m){if(MENTIONS){MENTIONS=null;render()}return}
      MENTIONQ=m[1];
      clearTimeout(mt);
      mt=setTimeout(async()=>{
        try{const d=await api.mentionable(MENTIONQ);
          MENTIONS=d.people.length?d.people:null;render();
          const f=$("#draft");if(f){f.focus();f.setSelectionRange(f.value.length,f.value.length)}
        }catch(e){}
      },160);
    };}
  const ce=$("#canceledit");if(ce)ce.onclick=()=>{EDITID=null;render()};
  document.querySelectorAll("[data-mpick]").forEach(b=>b.onclick=()=>{
    const u=MENTIONS[+b.dataset.mpick];
    const dr=$("#draft");
    dr.value=dr.value.replace(/@([a-z0-9._]*)$/i,"@"+u.username+" ");
    MENTIONS=null;render();
    const f=$("#draft");if(f){f.focus();f.setSelectionRange(f.value.length,f.value.length)}
  });

  const ab=$("#attachb");if(ab)ab.onclick=()=>$("#filein").click();
  const fi=$("#filein");if(fi)fi.onchange=async()=>{
    const f=fi.files&&fi.files[0];if(!f)return;
    fi.value="";
    if(f.type.startsWith("video/")){
      if(f.size>650*1024*1024)return toast("Video too big — 650MB max");
      // keep the File itself — we stream it, never base64 it
      PENDVID=f;PENDIMG=null;PENDKIND="video";PENDFILE=f;render();
      return;
    }
    if(f.size>30*1024*1024)return toast("That image is too big — 30MB max");
    PENDFILE=f;
    try{PENDPREP=await prepImage(f,ASWORK);PENDIMG=PENDPREP.thumb;PENDVID=null;PENDKIND="image";render()}
    catch(e){toast(e.message)}
  };
  const di=$("#dropimg");if(di)di.onclick=()=>{PENDIMG=null;PENDVID=null;PENDKIND=null;PENDFILE=null;PENDPREP=null;ASWORK=false;render()};
  const aw=$("#aswork");if(aw)aw.onchange=async()=>{
    ASWORK=aw.checked;
    if(PENDFILE&&PENDKIND==="image"){
      try{PENDPREP=await prepImage(PENDFILE,ASWORK);PENDIMG=PENDPREP.thumb;
        toast(ASWORK?"Full quality for your portfolio":"Standard quality")}catch(e){}
    }};
  wireFeed();wireSheet();wireMarket();wirePicker();
  const lb=$("#lb");if(lb)lb.onclick=()=>{LIGHTBOX=null;render()};
}

function wireFeed(){
  document.querySelectorAll("[data-like]").forEach(b=>b.onclick=async()=>{
    if(guest())return needAccount("Back someone's work. Likes are how people earn standing here — it's the whole point.");
    const id=b.dataset.like;
    const p=POSTS.find(x=>String(x.id)===id)||(SEARCHRES&&SEARCHRES.posts.find(x=>String(x.id)===id))
      ||(PROFILE&&[...PROFILE.posts,...PROFILE.collabs].find(x=>String(x.id)===id));
    // flip it now, reconcile after. Repaint ONLY this button — a full
    // re-render here throws away your scroll position.
    const was=p?p.likedByMe:b.classList.contains("on");
    const now=!was;
    if(p){p.likedByMe=now;p.likeCount=Math.max(0,p.likeCount+(now?1:-1))}
    b.classList.toggle("on",now);
    b.textContent=(now?"♥":"♡")+" "+(p?(p.likeCount||""):"");
    try{
      const liked=await api.like(id);
      if(p&&liked!==now){ // server disagreed — trust it
        p.likedByMe=liked;p.likeCount=Math.max(0,p.likeCount+(liked?1:-1));
        b.classList.toggle("on",liked);
        b.textContent=(liked?"♥":"♡")+" "+(p.likeCount||"");
      }
    }catch(e){
      if(p){p.likedByMe=was;p.likeCount=Math.max(0,p.likeCount+(was?1:-1));
        b.classList.toggle("on",was);b.textContent=(was?"♥":"♡")+" "+(p.likeCount||"")}

  if(!ME.emailVerified){
    try{const st=await api.authStatus();
      if(st.verified){await refreshMe();toast("Email confirmed — you're in");render();return}
    }catch(e){}
  }
  try{const [n,d]=await Promise.all([api.notifs(),api.dmList()]);
    const changed=n.unread!==UNREAD||d.unreadTotal!==DMUNREAD;
    UNREAD=n.unread;DMUNREAD=d.unreadTotal;
    loadUnreads();
    if(changed&&!NOTIFOPEN&&!DMOPENPANEL)render();
  }catch(e){/* offline */}
}
(async()=>{
  try{const d=await api.levels();LEVELS=d.levels}catch(e){/* offline default */}
  if(TOKEN)await refreshMe();          // invalid token just leaves ME null -> guest
  if(ME){
    startStream();refreshBadges();loadUnreads();
    setInterval(refreshBadges,20000);
    const p=new URLSearchParams(location.search);
    if(p.get("connect")==="done"){try{await api.connectStatus();await refreshMe();
      toast(ME.payoutsReady?"Payouts connected":"Stripe needs a bit more info")}catch(e){}
      history.replaceState({},"","/")}
    if(p.get("checkout")==="paid"){toast("Paid — the seller's been told to ship");history.replaceState({},"","/")}
    if(p.get("checkout")==="failed"){toast("Payment didn't go through");history.replaceState({},"","/")}
  }
  try{MKTMETA=await api.mktMeta()}catch(e){}   // public — guests see the Market too
  render();
  if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});
})();
</script>
</body>
