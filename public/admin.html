<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>TNLLABS — Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#000;--card:#0A0A0A;--el:#141414;--line:rgba(255,255,255,.12);--line2:rgba(255,255,255,.28);
--tx:#fff;--dim:#8A8A8A;--green:#22C55E;--red:#F87171;--amber:#FBBF24}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--tx);font-family:'Archivo',system-ui,sans-serif;min-height:100vh}
.mono{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.09em}
.dim{color:var(--dim)}
button{font-family:inherit;cursor:pointer}
a{color:var(--green);text-decoration:none}
h1,h2,h3{letter-spacing:-.01em}

.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;text-align:center}
.gate h1{font-size:24px;margin:12px 0 8px}
.gate p{color:var(--dim);font-size:13px;line-height:1.6;max-width:320px;margin:0 auto 18px}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--tx);color:#000;border:none;border-radius:9px;padding:11px 18px;font-weight:700;font-size:13px;text-decoration:none}
.btn.ghost{background:transparent;color:var(--tx);border:1px solid var(--line2)}
.btn.sm{padding:5px 10px;font-size:11px}

.top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);z-index:10}
.brand{font-weight:900;font-size:14px;letter-spacing:.03em}
.brand span{color:var(--green)}
.tag{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.14em;border:1px solid var(--line2);border-radius:999px;padding:3px 8px;color:var(--dim);margin-left:7px}
.nav{display:flex;gap:4px;overflow-x:auto;padding:10px 18px;border-bottom:1px solid var(--line)}
.nav button{flex-shrink:0;background:var(--el);border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;white-space:nowrap}
.nav button.on{background:var(--tx);color:#000;border-color:var(--tx)}
.nav .ghead{display:none}
.wrap{padding:18px;max-width:1200px;margin:0 auto}
/* Shopify-style grouped sidebar on desktop — same buttons, same wiring */
@media(min-width:920px){
  .nav{position:fixed;left:0;top:53px;bottom:0;width:212px;flex-direction:column;align-items:stretch;gap:1px;padding:12px 10px;border-bottom:none;border-right:1px solid var(--line);overflow-y:auto;background:var(--bg)}
  .nav button{background:none;border:none;text-align:left;border-radius:8px;padding:8px 12px;font-size:13px;color:var(--dim)}
  .nav button:hover{background:var(--el);color:var(--tx)}
  .nav button.on{background:var(--el);color:var(--tx);box-shadow:inset 2px 0 0 var(--green)}
  .nav .ghead{display:block;font-size:10.5px;color:var(--dim);opacity:.7;padding:14px 12px 5px;font-weight:600}
  .nav .ghead:first-child{padding-top:2px}
  .wrap{margin-left:212px;max-width:1080px}
}

.hero{margin-bottom:18px}
.hero h1{font-size:clamp(22px,5vw,32px);font-weight:900}
.hero p{color:var(--dim);font-size:13px;margin-top:4px}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px;margin-bottom:11px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.card .k{font-size:11.5px;color:var(--dim);font-weight:500}
.card .v{font-size:26px;font-weight:900;margin-top:7px;line-height:1}
.card .s{font-size:11px;color:var(--dim);margin-top:4px}
.card.hero-card{border-color:var(--green);background:linear-gradient(160deg,rgba(34,197,94,.12),transparent)}
.card.hero-card .v{color:var(--green)}
.card .up{color:var(--green)}
.card .warn{color:var(--amber)}

.spark{display:flex;align-items:flex-end;gap:3px;height:44px;margin-top:10px}
.spark div{flex:1;background:var(--el);border-radius:2px 2px 0 0;min-height:2px;position:relative}
.spark div.has{background:var(--green)}

.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:11px}
.panel h3{font-size:13px;margin-bottom:12px;color:var(--tx);font-weight:700}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.1em;color:var(--dim);padding:0 8px 9px;font-weight:400;white-space:nowrap}
td{padding:10px 8px;border-top:1px solid var(--line);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.who{display:flex;align-items:center;gap:8px;min-width:0}
.av{width:28px;height:28px;border-radius:50%;background:var(--el);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9px;flex-shrink:0;object-fit:cover}
.nm{font-weight:700;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lv{background:var(--green);color:#000;font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 5px;border-radius:4px;margin-left:5px}
.pill{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.08em;border:1px solid var(--line2);border-radius:999px;padding:2px 7px;color:var(--dim)}
.pill.ok{border-color:var(--green);color:var(--green)}
.pill.no{border-color:var(--red);color:var(--red)}
.pill.warn{border-color:var(--amber);color:var(--amber)}
.scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch}

.thumb{width:44px;height:44px;object-fit:cover;border-radius:7px;background:var(--el);flex-shrink:0}
.rowin{display:flex;align-items:center;gap:10px}
.trunc{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px;color:#D6D2C8}
.search{width:100%;background:var(--el);border:1px solid var(--line);border-radius:9px;color:var(--tx);padding:10px 13px;font-size:13px;margin-bottom:12px;font-family:inherit}
.search:focus{outline:none;border-color:var(--green)}
.bars{display:flex;flex-direction:column;gap:7px}
.bar{display:flex;align-items:center;gap:9px;font-size:12px}
.bar .lab{width:96px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim)}
.bar .track{flex:1;height:7px;background:var(--el);border-radius:4px;overflow:hidden}
.bar .fill{height:100%;background:var(--green);border-radius:4px}
.bar .n{width:26px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:10px}
.empty{padding:26px;text-align:center;color:var(--dim);font-size:13px;line-height:1.7}
.status{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.rep{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.35);border-radius:9px;padding:11px 13px;margin-bottom:8px}
.rep .rt{font-size:12.5px;font-weight:700}
.rep .rb{font-size:11.5px;color:var(--dim);margin-top:4px;line-height:1.5}
.acts{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.setrow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px solid var(--line)}
.setrow:last-child{border-bottom:none}
.setinfo b{font-size:13.5px}
.setdesc{font-size:12px;color:var(--dim);line-height:1.5;margin-top:3px;max-width:440px}
.setwarn{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.4);color:#FBBF24;border-radius:8px;padding:9px 11px;font-size:12px;line-height:1.5;margin-bottom:10px}
.toggle{width:44px;height:25px;border-radius:999px;background:var(--el);border:1px solid var(--line2);padding:2px;flex-shrink:0;position:relative;transition:background .15s}
.toggle span{display:block;width:19px;height:19px;border-radius:50%;background:var(--dim);transition:transform .15s,background .15s}
.toggle.on{background:var(--green);border-color:var(--green)}
.toggle.on span{transform:translateX(19px);background:#000}
.setnum{width:80px;background:var(--el);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:8px;font-size:16px;text-align:center;flex-shrink:0}
.lbl2{display:block;color:var(--dim);letter-spacing:.1em;margin:12px 0 5px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--tx);color:#000;font-weight:700;font-size:13px;border-radius:999px;padding:9px 18px;z-index:80}
@media(max-width:640px){
  .hide-sm{display:none}
  .wrap{padding:14px}
  td,th{padding-left:5px;padding-right:5px}
}

.ui-ov{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(0,0,0,.72);backdrop-filter:blur(5px)}
.ui-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line2);border-radius:16px;padding:22px}
.ui-title{font-size:16px;font-weight:800;line-height:1.3}
.ui-body{margin-top:8px;font-size:13px;line-height:1.55;color:var(--dim);white-space:pre-line}
.ui-btns{display:flex;gap:10px;margin-top:18px}
.ui-btn{flex:1;border-radius:10px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--tx)}
.ui-ok{background:var(--green);color:#000;border-color:var(--green)}
</style>
</head>
<body><div id="app"></div>
<script>
const API=location.origin;
let TOKEN=localStorage.getItem("tnl-token")||null;
let ME=null,TAB="overview",DATA={},Q="",TOASTT=null,MAILRESULT=null,ERR=null;
const $=s=>document.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const money=c=>"$"+((c||0)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const ago=t=>{if(!t)return "never";const s=(Date.now()-t)/1000;
  if(s<3600)return Math.floor(s/60)+"m";if(s<86400)return Math.floor(s/3600)+"h";
  if(s<2592000)return Math.floor(s/86400)+"d";return new Date(t).toLocaleDateString()};
const av=(u,n)=>u?`<img class="av" src="${esc(u)}" alt="">`:`<div class="av">${esc((n||"?").slice(0,2).toUpperCase())}</div>`;

async function req(path,opts={}){
  const h={"Content-Type":"application/json"};
  if(TOKEN)h.Authorization="Bearer "+TOKEN;
  const r=await fetch(API+path,{method:opts.method||"GET",headers:h,body:opts.body?JSON.stringify(opts.body):undefined});
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.error||("HTTP "+r.status));
  return d;
}
function toast(m){TOASTT=m;paint();setTimeout(()=>{TOASTT=null;paint()},2200)}
/* Same rule as the app: no native dialogs. One message string in, Promise<boolean> out —
   first line becomes the title, the rest the body. */
function uiConfirm(msg,opts={}){
  return new Promise(res=>{
    const parts=String(msg).split("\n\n");
    const ov=document.createElement("div");ov.className="ui-ov";
    ov.innerHTML=`<div class="ui-card"><div class="ui-title">${esc(parts[0]||"")}</div>
      ${parts.length>1?`<div class="ui-body">${esc(parts.slice(1).join("\n\n"))}</div>`:""}
      <div class="ui-btns"><button class="ui-btn ui-c">Cancel</button>
      <button class="ui-btn ui-ok">${esc(opts.okLabel||"Confirm")}</button></div></div>`;
    document.body.appendChild(ov);
    const done=v=>{ov.remove();res(v)};
    ov.querySelector(".ui-c").onclick=()=>done(false);
    ov.querySelector(".ui-ok").onclick=()=>done(true);
    ov.onclick=e=>{if(e.target===ov)done(false)};
  });
}

/* ---------- gate ---------- */
function gateHTML(msg){return `<div class="gate"><div>
  <div class="brand">TNLLABS <span>🧪</span></div>
  <h1>${esc(msg||"Admin only")}</h1>
  <p>${TOKEN?"This account doesn't have admin access. Every endpoint here is locked server-side, so there's nothing to see.":"Sign in to the app first, then come back to this page."}</p>
  <a class="btn" href="/">Open the app</a>
</div></div>`}

/* ---------- shell ---------- */
function paint(){
  const app=$("#app");
  if(!ME){app.innerHTML=gateHTML(TOKEN?"Not an admin":"Sign in first");return}
  app.innerHTML=`
    <div class="top">
      <div class="brand">TNLLABS <span>🧪</span><span class="tag">ADMIN</span></div>
      <div style="display:flex;align-items:center;gap:9px">
        <span class="mono dim hide-sm">${esc(ME.displayName)}</span>
        <a class="btn ghost sm" href="/">App ↗</a>
      </div>
    </div>
    <div class="nav">
      ${[["_","Home"],["overview","Overview"],
         ["_","Commerce"],["orders","Orders"],["market","Market"],
         ["_","Community"],["members","Members"],["content","Content"],
         ["reports","Reports"+(DATA.overview?.openReports?" ("+DATA.overview.openReports+")":"")],
         ["_","Analytics"],["funnel","Funnel"],["retention","Retention"],["studio","Studio"],
         ["_","System"],["health","Health"],["settings","Settings"]]
        .map(([id,l])=>id==="_"?`<div class="ghead">${l}</div>`
          :`<button class="${TAB===id?"on":""}" data-tab="${id}">${l}</button>`).join("")}
    </div>
    <div class="wrap">${ERR?errHTML():
      TAB==="overview"?overviewHTML():
      TAB==="funnel"?funnelHTML():
      TAB==="retention"?retentionHTML():
      TAB==="market"?marketHTML():
      TAB==="members"?membersHTML():
      TAB==="content"?contentHTML():
      TAB==="orders"?ordersHTML():
      TAB==="studio"?studioHTML():
      TAB==="health"?healthHTML():
      TAB==="settings"?settingsHTML():reportsHTML()}</div>
    ${TOASTT?`<div class="toast">${esc(TOASTT)}</div>`:""}`;
  wire();
}

/* ---------- overview ---------- */
function overviewHTML(){
  const d=DATA.overview;
  if(!d)return `<div class="empty">Loading…</div>`;
  const maxDay=Math.max(1,...d.daily.map(x=>x.posts));
  const flywheel=d.collabs>0;
  return `
  <div class="hero">
    <h1>The lab</h1>
    <p>${d.members} member${d.members===1?"":"s"} · ${d.active} posted this week · ${d.collabs} confirmed collab${d.collabs===1?"":"s"}</p>
  </div>
  <div class="status">
    <span class="pill ${d.mailOn?"ok":"warn"}">${d.mailOn?"EMAIL ON":"EMAIL OFF"}</span>
    <span class="pill ${d.paymentsOn?"ok":"warn"}">${d.paymentsOn?"PAYMENTS ON":"PAYMENTS OFF"}</span>
    ${d.openReports?`<span class="pill no">${d.openReports} OPEN REPORT${d.openReports===1?"":"S"}</span>`:""}
    ${d.pendingCollabs?`<span class="pill warn">${d.pendingCollabs} COLLAB${d.pendingCollabs===1?"":"S"} PENDING</span>`:""}
  </div>

  <div class="cards">
    <div class="card hero-card">
      <div class="k">CONFIRMED COLLABS</div>
      <div class="v">${d.collabs}</div>
      <div class="s">${d.collabsWeek} this week · <span class="dim">the only number that proves the model</span></div>
    </div>
    <div class="card"><div class="k">MEMBERS</div><div class="v">${d.members}</div>
      <div class="s">${d.newWeek?`<span class="up">+${d.newWeek}</span> this week`:"none this week"} · ${d.verified} verified</div></div>
    <div class="card"><div class="k">POSTED THIS WEEK</div><div class="v">${d.active}</div>
      <div class="s">of ${d.members} · ${d.activeMonth} in 30d</div></div>
    <div class="card"><div class="k">WORK PUBLISHED</div><div class="v">${d.work}</div>
      <div class="s">${d.workWeek} this week · ${d.posts} posts total</div></div>
  </div>

  <div class="cards">
    <div class="card"><div class="k">CROSS-LAB SHARES</div><div class="v">${d.crossLab}</div>
      <div class="s">work that travelled between labs</div></div>
    <div class="card"><div class="k">GMV</div><div class="v">${money(d.gmv)}</div>
      <div class="s">${d.sold} sale${d.sold===1?"":"s"} · ${d.listings} listed</div></div>
    <div class="card"><div class="k">COMMISSION</div><div class="v">${money(d.earned)}</div>
      <div class="s">tiered by seller level</div></div>
    <div class="card"><div class="k">BEATS MADE</div><div class="v">${d.beats}</div>
      <div class="s">${d.dms} DMs sent</div></div>
  </div>

  ${!flywheel?`<div class="rep"><div class="rt">No collabs yet.</div>
    <div class="rb">Posting is happening, but nobody's built together inside the app. That's the whole thesis — until it fires once, this is a feed. Get two people on one piece.</div></div>`:""}

  <div class="panel">
    <h3>POSTS · LAST 14 DAYS</h3>
    <div class="spark">${d.daily.map(x=>`<div class="${x.posts?"has":""}" style="height:${Math.max(4,(x.posts/maxDay)*100)}%" title="${x.d}: ${x.posts} posts"></div>`).join("")}</div>
    <div style="display:flex;justify-content:space-between;margin-top:6px" class="mono dim">
      <span>${d.daily[0].d}</span><span>${d.daily[d.daily.length-1].d}</span></div>
  </div>

  <div class="panel">
    <h3>WHERE PEOPLE SIT</h3>
    <div class="bars">${d.levels.map(l=>{
      const max=Math.max(1,...d.levels.map(x=>x.n));
      return `<div class="bar"><span class="lab">L${l.level} ${esc(l.name.toUpperCase())}</span>
        <div class="track"><div class="fill" style="width:${(l.n/max)*100}%"></div></div>
        <span class="n">${l.n}</span></div>`}).join("")}</div>
  </div>`;
}


/* ---------- funnel ---------- */
function funnelHTML(){
  const d=DATA.funnel;
  if(!d)return `<div class="empty">Loading…</div>`;
  const max=d.steps[0].n||1;
  return `
  <div class="hero"><h1>Funnel</h1><p>Where people stop. The biggest drop is your only real to-do.</p></div>
  <div class="panel">
    <div class="bars">${d.steps.map((s,i)=>{
      const prev=i?d.steps[i-1].n:s.n;
      const drop=prev-s.n;
      const dropPct=prev?Math.round((drop/prev)*100):0;
      const bad=i>0&&dropPct>=50;
      return `<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
          <span style="font-size:13px;font-weight:700">${esc(s.label)}</span>
          <span class="mono dim">${s.n} · ${s.pct}%</span>
        </div>
        <div class="track"><div class="fill" style="width:${(s.n/max)*100}%;${bad?"background:var(--red)":""}"></div></div>
        ${i>0&&drop>0?`<div class="mono ${bad?"":"dim"}" style="margin-top:4px;font-size:9px;${bad?"color:var(--red)":""}">
          ↓ ${drop} dropped off here (${dropPct}%)${bad?" — biggest leak":""}</div>`:""}
      </div>`}).join("")}</div>
  </div>
  <div class="panel">
    <h3>READ THIS AS</h3>
    <p style="font-size:13px;line-height:1.7;color:var(--dim)">
      Signups are easy. <b style="color:var(--tx)">Published work</b> is the first real signal —
      someone who publishes has decided this place is worth their reputation.
      <b style="color:var(--green)">Confirmed collabs</b> is the one that proves the model;
      if that row is near zero, everything above it is vanity.
    </p>
  </div>`;
}

/* ---------- retention ---------- */
function retentionHTML(){
  const d=DATA.retention;
  if(!d)return `<div class="empty">Loading…</div>`;
  return `
  <div class="hero"><h1>Retention</h1><p>Not who joined. Who stayed.</p></div>
  <div class="panel">
    <h3>WEEKLY COHORTS · STILL POSTING IN THE LAST 7 DAYS</h3>
    <div class="bars">${d.cohorts.map(c=>`
      <div class="bar"><span class="lab">${esc(c.week)}</span>
        <div class="track"><div class="fill" style="width:${c.pct}%"></div></div>
        <span class="n">${c.stillPosting}/${c.joined}</span></div>`).join("")}
    </div>
    ${d.cohorts.every(c=>!c.joined)?`<div class="empty">Nobody's joined in the last month.</div>`:""}
  </div>

  <div class="panel">
    <h3>SIGNED UP, NEVER POSTED (${d.silent.length})</h3>
    ${d.silent.length?`<div class="scrollx"><table><tbody>${d.silent.map(u=>`<tr>
      <td><b>${esc(u.display_name)}</b> <span class="mono dim">@${esc(u.username)}</span></td>
      <td class="mono dim">joined ${ago(u.created_at)}</td>
      <td><button class="btn ghost sm" data-dm="${esc(u.username)}">Nudge</button></td>
    </tr>`).join("")}</tbody></table></div>
    <p class="mono dim" style="margin-top:10px;line-height:1.6">These people signed up and stopped. At this size that's a text, not a campaign.</p>`
    :`<div class="empty">Everyone who joined has posted. That's rare — good.</div>`}
  </div>

  <div class="panel">
    <h3>GONE QUIET · POSTED BEFORE, NOT IN 14 DAYS (${d.quiet.length})</h3>
    ${d.quiet.length?`<div class="scrollx"><table><tbody>${d.quiet.map(u=>`<tr>
      <td><b>${esc(u.display_name)}</b> <span class="mono dim">@${esc(u.username)}</span></td>
      <td class="mono dim">${u.posts} posts · last ${ago(u.last_post)}</td>
      <td><button class="btn ghost sm" data-dm="${esc(u.username)}">Nudge</button></td>
    </tr>`).join("")}</tbody></table></div>`
    :`<div class="empty">Nobody's gone quiet.</div>`}
  </div>

  <div class="panel">
    <h3>MESSAGE EVERYONE</h3>
    <p class="mono dim" style="margin-bottom:10px;line-height:1.6">Lands as a DM from you. At this size that's worth more than a push notification.</p>

    <div class="card"><div class="k">GMV</div><div class="v">${money(d.gmv)}</div>

    <div class="card"><div class="k">PAYOUTS CONNECTED</div><div class="v">${d.connected}</div>

  <div class="cards">

    <div style="display:flex;justify-content:space-between;margin-top:6px" class="mono dim">

      <tbody>${d.topSellers.map(x=>`<tr>

      </tr>`).join("")}</tbody></table></div>`:`<div class="empty">No sales yet.</div>`}

  <div class="panel">

    ${d.stale.length?`<div class="scrollx"><table><tbody>${d.stale.map(x=>`<tr>
      <td><b>${esc(x.title)}</b> <span class="mono dim">@${esc(x.username)}</span></td>
      <td class="mono dim">${money(x.price_cents)} · ${x.views} views</td>

function errHTML(){
  const e=ERR;
  return `<div class="hero"><h1>${e.stale?"Server's behind":"Something broke"}</h1>
    <p>${e.stale
      ? "This dashboard is asking for something the deployed server doesn't have yet."
      : "The " + esc(e.tab.toUpperCase()) + " tab couldn't load."}</p></div>
  <div class="panel">
    <div class="rep"><div class="rt">${esc(e.tab.toUpperCase())} → ${esc(e.msg)}</div>
    <div class="rb">${e.stale
      ? "<b>admin.html is newer than server.js.</b> They ship together — the tab exists in the dashboard but the endpoint it calls doesn't exist on the server yet.<br><br>Upload <b>src/server.js</b> and redeploy. Every other tab will keep working meanwhile."
      : "The request failed. If this persists, check HEALTH → errors — the app logs its own breakage now."}</div></div>
    <button class="btn" data-retry style="margin-top:12px">Try again</button>

}

/* ---------- studio ---------- */
function studioHTML(){
  const d=DATA.studio;
  if(!d)return `<div class="empty">Loading…</div>`;
  const f=d.funnel;
  const maxF=Math.max(1,f.opened);
  const names={kick:"KICK",snare:"SNARE",hat:"HAT",clap:"CLAP",perc:"PERC",bass:"808",synth:"SYNTH"};
  return `
  <div class="hero"><h1>Studio</h1><p>What producers do with it. This decides what gets built next — not my taste, not yours.</p></div>

  <div class="panel">
    <h3>WHICH BUILT-IN SOUNDS PRODUCERS THROW AWAY</h3>
    <p style="font-size:13px;line-height:1.7;color:var(--dim);margin-bottom:14px">
      Someone replacing a built-in voice with their own sample is the most honest quality
      signal there is: they heard it, didn't like it, and did something about it.
      <b style="color:var(--tx)">Whatever's at the top of this list is what I fix next.</b>
    </p>
    ${d.replaced.length?`<div class="bars">${(()=>{
      const max=Math.max(...d.replaced.map(x=>x.n));
      return d.replaced.map(x=>`<div class="bar">
        <span class="lab">${esc(names[x.voice]||x.voice.toUpperCase())}</span>
        <div class="track"><div class="fill" style="width:${(x.n/max)*100}%;background:var(--red)"></div></div>
        <span class="n">${x.n}</span>
      </div>`).join("");
    })()}</div>
    <p class="mono dim" style="margin-top:10px;line-height:1.6">Replaced by ${d.replaced.reduce((s,x)=>s+x.people,0)} producer(s). Red because it's a complaint.</p>`
    :`<div class="empty">Nobody's replaced a built-in sound yet.<br><br>Either they're fine — or nobody's opened the studio. Check the funnel.</div>`}
  </div>

  <div class="panel">
    <h3>DOES ANYONE ACTUALLY USE IT</h3>
    <div class="bars">${[["Opened the studio",f.opened],["Pressed play",f.played],["Saved a draft",f.saved],["Published to #beats",f.published],["Exported a WAV",f.exported]]
      .map(([l,n],i,arr)=>{
        const prev=i?arr[i-1][1]:n; const drop=prev-n;
        const bad=i>0&&prev>0&&drop/prev>=0.5;
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:700">${l}</span><span class="mono dim">${n}</span></div>
          <div class="track"><div class="fill" style="width:${(n/maxF)*100}%;${bad?"background:var(--red)":""}"></div></div>
          ${bad?`<div class="mono" style="color:var(--red);font-size:9px;margin-top:3px">↓ lost ${drop} here</div>`:""}
        </div>`}).join("")}</div>
    ${!f.opened?`<div class="rep" style="margin-top:12px"><div class="rt">Nobody has opened the studio.</div>
      <div class="rb">The most technically involved thing in the app and it has zero users. That's not a sound quality problem — you can't be let down by a sound you never heard. Something upstream is stopping them: they don't know it's there, it looks like work, or they came for something else. Ask one person.</div></div>`:""}
  </div>

  <div class="cards">
    <div class="card"><div class="k">BEATS PUBLISHED</div><div class="v">${d.published}</div>
      <div class="s">${d.withSamples} used custom sounds · ${d.withSlides} used 808 slides</div></div>
    <div class="card"><div class="k">SOUNDS UPLOADED</div><div class="v">${d.totalSamples}</div>
      <div class="s">by ${d.uploaders} producer${d.uploaders===1?"":"s"}</div></div>
    <div class="card"><div class="k">MEDIAN BPM</div><div class="v">${d.bpm.median||"—"}</div>
      <div class="s">${d.bpm.min?d.bpm.min+"–"+d.bpm.max+" range":"nothing published yet"}${d.bpm.median&&d.bpm.median!==140?" · default is 140":""}</div></div>
    <div class="card"><div class="k">MEDIAN LOUDNESS</div><div class="v">${d.medianLoudness!=null?Math.round(d.medianLoudness*100)+"%":"—"}</div>
      <div class="s">default is 75%${d.medianLoudness!=null&&Math.abs(d.medianLoudness-0.75)>0.15?" — they disagree":""}</div></div>
  </div>

  <div class="panel">
    <h3>THE SPEC — WHAT REAL SOUNDS MEASURE vs WHAT I BUILT</h3>
    <p style="font-size:13px;line-height:1.7;color:var(--dim);margin-bottom:14px">
      Measured in the browser while each sample was being decoded to play. Numbers only —
      never the audio. <b style="color:var(--tx)">Where these disagree, mine is wrong.</b>
      This is the spec for the built-in sounds, written by the people using them.
    </p>
    ${d.shape&&d.shape.length?`<div class="scrollx"><table>
      <thead><tr><th>SLOT</th><th>N</th><th>THEIRS</th><th>MINE</th><th>VERDICT</th></tr></thead>
      <tbody>${d.shape.map(x=>{
        const m=d.mine[x.slot]||d.mine[x.slot==="bass"?"bass":x.slot];
        const fund=x.fund?Math.round(x.fund):null;
        const rows=[];
        if(m){
          if(fund&&m.fund){
            const off=Math.round((fund-m.fund)/m.fund*100);
            if(Math.abs(off)>15)rows.push(`pitch ${off>0?"+":""}${off}% — mine sits at ${m.fund}Hz, theirs at ${fund}Hz`);
          }
          if(x.decay&&m.decay){
            const off=Math.round((x.decay-m.decay)/m.decay*100);
            if(Math.abs(off)>25)rows.push(`decay ${off>0?"+":""}${off}% — mine ${m.decay}ms, theirs ${Math.round(x.decay)}ms`);
          }
          if(x.centroid&&m.centroid){
            const off=Math.round((x.centroid-m.centroid)/m.centroid*100);
            if(Math.abs(off)>40)rows.push(`${off>0?"brighter":"darker"} — mine ${m.centroid}Hz, theirs ${Math.round(x.centroid)}Hz`);
          }
        }
        return `<tr>
          <td><b>${esc(x.slot.toUpperCase())}</b></td>
          <td class="mono dim">${x.n}</td>
          <td class="mono dim" style="font-size:10px">
            ${fund?fund+"Hz · ":""}${Math.round(x.decay)}ms<br>
            <span style="opacity:.7">${Math.round(x.centroid)}Hz bright · ${x.peak.toFixed(1)}dB peak</span></td>
          <td class="mono dim" style="font-size:10px">${m?esc(m.note):"—"}</td>
          <td style="max-width:240px">${rows.length
            ? rows.map(r=>`<div class="mono" style="color:var(--red);font-size:9px;line-height:1.5">→ ${esc(r)}</div>`).join("")
            : `<span class="mono" style="color:var(--green);font-size:9px">mine's in the ballpark</span>`}</td>
        </tr>`;}).join("")}</tbody></table></div>
      <p class="mono dim" style="margin-top:10px;line-height:1.6">
        Red = a measurable gap between my synth and what producers actually use. Not taste — arithmetic.</p>`
    :`<div class="empty">No sounds measured yet.<br><br>The moment a producer uploads a kick, this table tells me exactly how wrong mine is.</div>`}
  </div>

  <div class="panel">
    <h3>WHAT FORMATS THEY BRING</h3>
    ${d.formats.length?`<div class="scrollx"><table>
      <thead><tr><th>FORMAT</th><th>UPLOADS</th><th>PEOPLE</th><th>AVG SIZE</th></tr></thead>
      <tbody>${d.formats.map(x=>`<tr>
        <td><b>${esc(x.fmt.toUpperCase())}</b></td><td>${x.n}</td><td>${x.people}</td>
        <td class="mono dim">${(x.avg_bytes/1024).toFixed(0)} KB</td>
      </tr>`).join("")}</tbody></table></div>
      <p class="mono dim" style="margin-top:10px;line-height:1.6">If a format shows up that we reject, that's a silent wall. AIFF was one — a producer's Logic kit would've bounced.</p>`
    :`<div class="empty">No sounds uploaded yet.</div>`}
  </div>

  ${d.slots.length?`<div class="panel">
    <h3>WHAT SOUNDS THEY NEED MOST</h3>
    <div class="bars">${(()=>{const max=Math.max(...d.slots.map(x=>x.n));
      return d.slots.map(x=>`<div class="bar"><span class="lab">${esc(x.slot.toUpperCase())}</span>
        <div class="track"><div class="fill" style="width:${(x.n/max)*100}%"></div></div>
        <span class="n">${x.n}</span></div>`).join("")})()}</div>
  </div>`:""}

  ${d.voiceUse.length?`<div class="panel">
    <h3>WHICH TRACKS GET USED AT ALL</h3>
    <div class="bars">${(()=>{const max=Math.max(...d.voiceUse.map(x=>x.n));
      return d.voiceUse.map(x=>`<div class="bar"><span class="lab">${esc((names[x.id]||x.id).toUpperCase())}</span>
        <div class="track"><div class="fill" style="width:${(x.n/max)*100}%"></div></div>
        <span class="n">${x.n}</span></div>`).join("")})()}</div>
    <p class="mono dim" style="margin-top:10px;line-height:1.6">A track nobody touches is a track that should be cut, not improved. Dead weight makes the whole thing look harder than it is.</p>
  </div>`:""}

  <div class="panel">
    <h3>WHERE THE LINE IS</h3>
    <p style="font-size:13px;line-height:1.7;color:var(--dim)">
      <b style="color:var(--green)">We measure:</b> the shape of an uploaded sound — pitch, length,
      brightness, level. Computed in the browser while it's already decoded to play. Only the
      numbers come back. Aggregated by slot, never per person.<br><br>
      <b style="color:var(--red)">We don't:</b> store or analyse the audio server-side. Build a
      profile of anyone's sound. Share it. Use it to recreate their kit.<br><br>
      <b style="color:var(--tx)">And the studio says so</b>, in the upload panel, in plain words.
      A quiet version of this would be mining — and if that ever got out you wouldn't lose a
      feature, you'd lose the trust the whole network runs on. Disclosure is what makes it fair,
      not the code.
    </p>
  </div>`;
}

      <p style="font-size:13px;line-height:1.65;color:var(--dim);margin-bottom:12px">
        The <b style="color:var(--tx)">code</b> of the app running right now — every source file, zipped
        with today's date. Your safety net for "which version was latest": whatever is
        <b style="color:var(--tx)">live</b> is what downloads, so the deployed app is always the source of
        truth. Push it to GitHub and you never lose track again.
      </p>
      <button class="btn green" data-dlsource>↓ Download current app</button>
      <p class="mono dim" style="margin-top:9px;font-size:11px">Stamped: TNL-LABS-YYYY-MM-DDTHH-MM-SS.zip</p>
    </div>

    <div class="panel">
      <h3>BACKUPS</h3>
    <p style="font-size:13px;line-height:1.65;color:var(--dim);margin-bottom:12px">
      The database <b style="color:var(--tx)">is</b> the business — six years of relationships live in it.
      Automatic daily, keeps 7. <b style="color:var(--tx)">Download one now and again:</b> a backup on the same
      volume as the database protects you from your own mistakes, not from losing the volume.
    </p>
    <button class="btn" data-backup>Back up now</button>
    ${DATA.backups?(DATA.backups.backups.length?`<div class="scrollx" style="margin-top:12px"><table><tbody>
      ${DATA.backups.backups.map(b=>`<tr>
        <td class="mono" style="font-size:11px">${esc(b.name)}</td>
        <td class="mono dim">${(b.bytes/1024).toFixed(0)} KB</td>
        <td class="mono dim">${ago(b.at)}</td>
        <td><button class="btn ghost sm" data-dlbackup="${esc(b.name)}">Download</button></td>
      </tr>`).join("")}
    </tbody></table></div>`:`<div class="empty">No backups yet — the first runs an hour after boot. Make one now.</div>`):""}
  </div>

  <div class="panel">
    <h3>EMAIL — TEST IT</h3>
    <p style="font-size:13px;line-height:1.65;color:var(--dim);margin-bottom:12px">
      Email fails silently: Resend returns 200 whether it delivers or bins it, so a
      missing email looks exactly like a working one. Send yourself a real verification
      email and find out.
    </p>
    <input class="search" id="testto" placeholder="Send a test to… (blank = your address)">
    <button class="btn" data-testmail>Send test email</button>
    ${MAILRESULT?`<div class="rep" style="margin-top:12px;${MAILRESULT.ok?"background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.35)":""}">
      <div class="rt" style="${MAILRESULT.ok?"color:var(--green)":"color:var(--red)"}">${MAILRESULT.ok?"✓ Resend accepted it":"✗ Resend rejected it"}</div>
      <div class="rb">
        to <b>${esc(MAILRESULT.to||"")}</b> · from <b>${esc(MAILRESULT.from||"")}</b> · ${MAILRESULT.ms||0}ms<br>
        ${MAILRESULT.error?`<span style="color:var(--red)">${esc(MAILRESULT.error)}</span><br>`:""}
        ${esc(MAILRESULT.detail||"")}
        ${MAILRESULT.testSender?`<br><span style="color:var(--amber)">⚠ You're on Resend's test sender — it only delivers to your own address.</span>`:""}
      </div>
    </div>`:""}
  </div>

  <div class="panel">
    <h3>WHO'S WAITING ON AN EMAIL</h3>
    ${!DATA.maillog?`<div class="empty">Loading…</div>`:(()=>{
      const un=DATA.maillog.members.filter(m=>!m.verified);
      if(!un.length)return `<div class="empty">Everyone's verified.</div>`;
      return `<div class="scrollx"><table>
        <thead><tr><th>MEMBER</th><th>EMAIL</th><th>JOINED</th><th></th></tr></thead>
        <tbody>${un.map(m=>`<tr>
          <td><b>${esc(m.displayName)}</b> <span class="mono dim">@${esc(m.username)}</span></td>
          <td class="mono dim">${esc(m.email)}</td>
          <td class="mono dim">${ago(m.joined)}</td>
          <td><button class="btn ghost sm" data-verify="${esc(m.username)}">Verify manually</button></td>
        </tr>`).join("")}</tbody></table></div>
      <p class="mono dim" style="margin-top:10px;line-height:1.6">Stuck people. Verify them by hand — better than losing them to an inbox.</p>`;
    })()}
  </div>

  <div class="panel">
    <h3>WHAT'S ACTUALLY BREAKING</h3>
    ${!DATA.errors?`<div class="empty">Loading…</div>`
      :!DATA.errors.errors.length?`<div class="empty">Nothing logged. Either it's healthy or nobody's using it — check the numbers, not this box.</div>`
      :`<div class="scrollx"><table>
        <thead><tr><th>WHEN</th><th>KIND</th><th>WHAT</th><th>WHERE</th><th>WHO</th></tr></thead>
        <tbody>${DATA.errors.errors.slice(0,25).map(e=>`<tr>
          <td class="mono dim">${ago(e.created_at)}</td>
          <td><span class="pill ${e.kind==="server"?"no":"warn"}">${esc(e.kind.toUpperCase())}</span></td>
          <td style="max-width:280px"><div class="trunc" title="${esc(e.detail||"")}">${esc(e.message)}</div></td>
          <td class="mono dim">${esc(e.path||"—")}</td>
          <td class="mono dim">${e.username?"@"+esc(e.username):"—"}</td>
        </tr>`).join("")}</tbody></table></div>
      <button class="btn ghost sm" data-clearerrors style="margin-top:10px">Clear the log</button>`}
  </div>

  <div class="panel">
    <h3>DETAIL</h3>
    <div class="scrollx"><table><tbody>
      <tr><td class="mono dim">PUBLIC URL</td><td>${d.publicUrl?esc(d.publicUrl):`<span style="color:var(--red)">unset — verification links will be wrong</span>`}</td></tr>
      <tr><td class="mono dim">NODE</td><td>${esc(d.node)}</td></tr>
      <tr><td class="mono dim">AWAITING VERIFY</td><td>${d.pendingVerify}</td></tr>
      <tr><td class="mono dim">OPEN REPORTS</td><td>${d.unhandledReports}</td></tr>
    </tbody></table></div>
  </div>`;
}

        ${!u.isAdmin?`<button class="btn ghost sm" data-suspend="${esc(u.username)}:${u.suspended?"0":"1"}" title="${u.suspended?"Restore":"Suspend"}" style="${u.suspended?"color:var(--red);border-color:var(--red)":""}">${u.suspended?"↺":"⊘"}</button>`:""}

  <div class="panel scrollx"><table>

/* ---------- wiring ---------- */
function wire(){
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{TAB=b.dataset.tab;ERR=null;paint();load()});
  const q=$("#q");
  if(q){let t=null;q.oninput=()=>{Q=q.value;clearTimeout(t);t=setTimeout(async()=>{
    try{DATA.members=(await req("/api/admin/members?q="+encodeURIComponent(Q))).members;
      const v=Q;paint();const f=$("#q");if(f){f.value=v;f.focus();f.setSelectionRange(v.length,v.length)}
    }catch(e){toast(e.message)}},260)}}
  document.querySelectorAll("[data-feature]").forEach(b=>b.onclick=async()=>{
    if(!(await uiConfirm("Award +40 rep to @"+b.dataset.feature+"? This is the 'feature' award — it's permanent and audited.")))return;
    try{await req("/api/admin/members/"+b.dataset.feature+"/feature",{method:"POST"});toast("Featured — +40 rep");load()}catch(e){toast(e.message)}});
  document.querySelectorAll("[data-verify]").forEach(b=>b.onclick=async()=>{
    try{await req("/api/admin/members/"+b.dataset.verify+"/verify",{method:"POST"});toast("Verified");load()}catch(e){toast(e.message)}});
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{
    if(!(await uiConfirm("Delete this post? Can't be undone.")))return;
    try{await req("/api/admin/posts/"+b.dataset.del,{method:"DELETE"});toast("Deleted");load()}catch(e){toast(e.message)}});
  document.querySelectorAll("[data-dm]").forEach(b=>b.onclick=()=>{
    // open a DM with them in the app — a nudge from you, not a system mail
    window.open("/?dm="+encodeURIComponent(b.dataset.dm),"_blank");
  });
  document.querySelectorAll("[data-bcast]").forEach(b=>b.onclick=async()=>{
    const body=$("#bcast")?.value.trim();
    if(!body)return toast("Write something first");
    const target=b.dataset.bcast;
    const who=target==="all"?"everyone":target==="silent"?"everyone who's never posted":"everyone who's gone quiet";
    if(!(await uiConfirm("Send this as a DM to "+who+"?\n\n\""+body.slice(0,120)+(body.length>120?"…":"")+"\"\n\nThis can't be undone.")))return;
    try{const d=await req("/api/admin/broadcast",{method:"POST",body:{body,target}});
      toast("Sent to "+d.sent);$("#bcast").value=""}catch(e){toast(e.message)}});
  document.querySelectorAll("[data-retry]").forEach(b=>b.onclick=()=>{ERR=null;paint();load()});
  document.querySelectorAll("[data-backup]").forEach(b=>b.onclick=async()=>{
    b.textContent="Backing up…";b.disabled=true;
    try{const d=await req("/api/admin/backups",{method:"POST"});
      toast("Backed up — "+(d.bytes/1024).toFixed(0)+"KB");load()}
    catch(e){toast(e.message);b.textContent="Back up now";b.disabled=false}});
  const dls=document.querySelector("[data-dlsource]");
  if(dls)dls.onclick=()=>{
    toast("Zipping the app…");
    fetch(API+"/api/admin/source",{headers:{Authorization:"Bearer "+TOKEN}})
      .then(r=>{if(!r.ok)throw 0;
        const cd=r.headers.get("content-disposition")||"";
        const m=cd.match(/filename="([^"]+)"/);
        return r.blob().then(bl=>({bl,name:m?m[1]:"TNL-LABS.zip"}))})
      .then(({bl,name})=>{
        const u=URL.createObjectURL(bl);const a=document.createElement("a");
        a.href=u;a.download=name;document.body.appendChild(a);a.click();
        document.body.removeChild(a);URL.revokeObjectURL(u);
        toast("Downloaded "+name+" — push it to GitHub");
      }).catch(()=>toast("Download failed"));
  };
  document.querySelectorAll("[data-dlbackup]").forEach(b=>b.onclick=()=>{
    // the token has to ride along — this is an authenticated download
    fetch(API+"/api/admin/backups/"+b.dataset.dlbackup,{headers:{Authorization:"Bearer "+TOKEN}})
      .then(r=>r.blob()).then(bl=>{
        const u=URL.createObjectURL(bl);const a=document.createElement("a");
        a.href=u;a.download=b.dataset.dlbackup;document.body.appendChild(a);a.click();
        document.body.removeChild(a);URL.revokeObjectURL(u);
        toast("Downloaded — keep it somewhere that isn't Railway");
      }).catch(e=>toast("Download failed"));
  });
  document.querySelectorAll("[data-clearerrors]").forEach(b=>b.onclick=async()=>{
    if(!(await uiConfirm("Clear the error log?")))return;
    try{await req("/api/admin/errors",{method:"DELETE"});toast("Cleared");load()}catch(e){toast(e.message)}});
  document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=async()=>{
    const k=b.dataset.toggle, now=DATA.settings.settings[k]==="1";
    if(k==="autoVerify"&&!now&&!(await uiConfirm("Turn OFF email verification?\n\nAnyone will be able to register with an address they don't own. Only do this while email is broken.")))return;
    try{const d=await req("/api/admin/settings",{method:"PATCH",body:{[k]:now?"0":"1"}});
      DATA.settings.settings=d.settings;paint();toast(k+" "+(now?"off":"on"))}catch(e){toast(e.message)}});
  const mr=$("#set-minrep");if(mr)mr.onchange=async()=>{
    try{const d=await req("/api/admin/settings",{method:"PATCH",body:{minRepToSell:mr.value}});
      DATA.settings.settings=d.settings;toast("Saved")}catch(e){toast(e.message)}};
  document.querySelectorAll("[data-savepin]").forEach(b=>b.onclick=async()=>{
    try{const d=await req("/api/admin/settings",{method:"PATCH",body:{pinterestBoard:$("#set-pinboard").value.trim()}});
      DATA.settings.settings=d.settings;toast("Saved — live now");paint()}catch(e){toast(e.message)}});
  document.querySelectorAll("[data-savedistro]").forEach(b=>b.onclick=async()=>{
    try{const d=await req("/api/admin/settings",{method:"PATCH",body:{
      distroLevel:$("#set-distrolvl").value, distroBlurb:$("#set-distroblurb").value}});
      DATA.settings.settings=d.settings;toast("Saved — live now");paint()}catch(e){toast(e.message)}});
  document.querySelectorAll("[data-savetext]").forEach(b=>b.onclick=async()=>{
    try{const d=await req("/api/admin/settings",{method:"PATCH",body:{
      headline:$("#set-headline").value, tagline:$("#set-tagline").value, announcement:$("#set-announce").value}});
      DATA.settings.settings=d.settings;toast("Saved — live now")}catch(e){toast(e.message)}});
  document.querySelectorAll("[data-testmail]").forEach(b=>b.onclick=async()=>{
    const to=$("#testto")?.value.trim()||undefined;
    b.textContent="Sending…";b.disabled=true;
    try{MAILRESULT=await req("/api/admin/test-email",{method:"POST",body:{to}})}
    catch(e){MAILRESULT={ok:false,error:e.message,detail:"The request itself failed."}}
    paint();
  });
  document.querySelectorAll("[data-cleanup]").forEach(b=>b.onclick=async()=>{
    if(!(await uiConfirm("Delete files nothing points at?\n\nThis only removes uploads with no post, listing, avatar or message referencing them. It can't be undone.")))return;
    try{const d=await req("/api/admin/cleanup",{method:"POST"});
      toast("Removed "+d.removed+" files, freed "+(d.freed/1048576).toFixed(1)+"MB");load()}catch(e){toast(e.message)}});
  document.querySelectorAll("[data-rep]").forEach(b=>b.onclick=async()=>{
    const [u,delta]=b.dataset.rep.split(":");
    if(!(await uiConfirm((delta>0?"Grant +":"Deduct ")+Math.abs(delta)+" rep to @"+u+"?\n\nThis is logged and permanent.")))return;
    try{const d=await req("/api/admin/members/"+u+"/rep",{method:"POST",body:{delta:+delta}});
      toast("@"+u+" now "+d.rep+" rep");load()}catch(e){toast(e.message)}});
  document.querySelectorAll("[data-suspend]").forEach(b=>b.onclick=async()=>{
    const [u,on]=b.dataset.suspend.split(":");
    const susp=on==="1";
    if(!(await uiConfirm(susp?("Suspend @"+u+"?\n\nThey're signed out immediately and can't log back in. Their work stays up."):("Restore @"+u+"?")))) return;
    try{await req("/api/admin/members/"+u+"/suspend",{method:"POST",body:{suspended:susp}});
      toast(susp?"@"+u+" suspended":"@"+u+" restored");load()}catch(e){toast(e.message)}});
  document.querySelectorAll("[data-dellist]").forEach(b=>b.onclick=async()=>{
    if(!(await uiConfirm("Remove this listing? The seller gets told.")))return;
    try{await req("/api/admin/listings/"+b.dataset.dellist,{method:"DELETE"});toast("Removed");load()}catch(e){toast(e.message)}});
  document.querySelectorAll("[data-handle]").forEach(b=>b.onclick=async()=>{
    try{await req("/api/admin/reports/"+b.dataset.handle+"/handle",{method:"POST"});toast("Dismissed");load()}catch(e){toast(e.message)}});
}

async function load(){
  try{
    if(TAB==="overview")DATA.overview=await req("/api/admin/overview");
    if(TAB==="members")DATA.members=(await req("/api/admin/members?q="+encodeURIComponent(Q))).members;
    if(TAB==="content")DATA.content=(await req("/api/admin/content")).posts;
    if(TAB==="orders")DATA.orders=(await req("/api/admin/orders")).orders;
    if(TAB==="reports")DATA.reports=(await req("/api/admin/reports")).reports;
    if(TAB==="funnel")DATA.funnel=await req("/api/admin/funnel");
    if(TAB==="retention")DATA.retention=await req("/api/admin/retention");
    if(TAB==="market")DATA.market=await req("/api/admin/market");
    if(TAB==="health"){DATA.health=await req("/api/admin/health");
      DATA.maillog=await req("/api/admin/mail-log");
      DATA.errors=await req("/api/admin/errors");
      DATA.backups=await req("/api/admin/backups");}
    if(TAB==="settings")DATA.settings=await req("/api/admin/settings");
    if(TAB==="studio")DATA.studio=await req("/api/admin/studio");
    if(!DATA.overview&&TAB!=="overview")DATA.overview=await req("/api/admin/overview");
    paint();
  }catch(e){ if(/admins only|token/i.test(e.message)){ME=null;paint()} else toast(e.message) }
}

(async()=>{
  if(!TOKEN){paint();return}
  try{
    const d=await req("/api/me");
    if(!d.user.isAdmin){ME=null;paint();return}
    ME=d.user;
    await load();
    setInterval(()=>{if(TAB==="overview")load()},30000);
  }catch(e){ME=null;paint()}
})();
</script>
</body>
</html>
